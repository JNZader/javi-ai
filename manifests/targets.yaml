kind: install-target-catalog
contract_version: 0.1.0
status: published
targets:
  - id: target.claude.user
    display_name: Claude Code user profile
    runtime_type: user-profile
    supported_providers:
      - claude
    install_mode: sync
    compatibility_notes:
      - intended for per-user Claude Code workstation installs
      - consumers select this target by published ID only, not by home-directory path assumptions
      - shared packages and provider.claude.core remain compatible with this target
  - id: target.opencode.user
    display_name: OpenCode user profile
    runtime_type: user-profile
    supported_providers:
      - opencode
    install_mode: sync
    compatibility_notes:
      - intended for per-user OpenCode workstation installs
      - consumers select this target by published ID only, not by home-directory path assumptions
      - shared packages and provider.opencode.core remain compatible with this target
  - id: target.gemini.user
    display_name: Gemini CLI user profile
    runtime_type: user-profile
    supported_providers:
      - gemini
    install_mode: sync
    compatibility_notes:
      - intended for per-user Gemini CLI workstation installs
      - consumers select this target by published ID only, not by home-directory path assumptions
      - shared packages and provider.gemini.core remain compatible with this target
  - id: target.qwen.user
    display_name: Qwen Code user profile
    runtime_type: user-profile
    supported_providers:
      - qwen
    install_mode: sync
    compatibility_notes:
      - intended for per-user Qwen Code workstation installs
      - consumers select this target by published ID only, not by home-directory path assumptions
      - shared packages and provider.qwen.core remain compatible with this target
  - id: target.codex.user
    display_name: Codex CLI user profile
    runtime_type: user-profile
    supported_providers:
      - codex
    install_mode: sync
    compatibility_notes:
      - intended for per-user Codex CLI workstation installs
      - consumers select this target by published ID only, not by home-directory path assumptions
      - shared packages and provider.codex.core remain compatible with this target
  - id: target.copilot.repo
    display_name: GitHub Copilot repository profile
    runtime_type: repo-profile
    supported_providers:
      - copilot
    install_mode: generate
    compatibility_notes:
      - intended for repository-scoped Copilot assets rather than a user-home profile
      - consumers select this target by published ID only, not by repository layout assumptions
      - shared packages and provider.copilot.core remain compatible with this target
reserved_target_ids:
  - target.claude.user
  - target.opencode.user
  - target.gemini.user
  - target.qwen.user
  - target.codex.user
  - target.copilot.repo
install_modes:
  - link
  - copy
  - generate
  - sync
target_contract:
  required_fields:
    - id
    - runtime_type
    - supported_providers
    - install_mode
    - compatibility_notes
