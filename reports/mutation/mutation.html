 is picked', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n    await fs.writeFile(configFile, `${MARKER_START}\\nContent\\n${MARKER_END}`, 'utf-8')\n\n    // Create in ascending order (OS might store in any order)\n    const backups = [\n      ['2021-01-01T00-00-00-000Z', '# 2021'],\n      ['2023-06-15T12-00-00-000Z', '# 2023'],\n      ['2022-03-20T08-00-00-000Z', '# 2022'],\n    ] as const\n\n    for (const [ts, content] of backups) {\n      const dir = path.join(p.BACKUP_DIR, ts, 'claude')\n      await fs.ensureDir(dir)\n      await fs.writeFile(path.join(dir, 'CLAUDE.md'), content, 'utf-8')\n    }\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    await runUninstall(items)\n\n    const restoredContent = await fs.readFile(configFile, 'utf-8')\n    // Most recent is 2023-06-15\n    expect(restoredContent).toBe('# 2023')\n  })\n\n  // ── runUninstall: hooks-dir source doesn't exist → nothing removed ─────────\n\n  it('hooks-dir: hooks source does not exist → no files removed', async () => {\n    const p = getUninstallPaths()\n    const hooksDir = path.join(p.tmpDir, 'hooks')\n    await fs.ensureDir(hooksDir)\n    await fs.writeFile(path.join(hooksDir, 'user-hook.sh'), '#!/bin/sh', 'utf-8')\n    // No FIXED_ASSETS_ROOT/own/hooks/claude\n\n    const items: UninstallItem[] = [\n      { label: 'hooks', path: hooksDir, type: 'hooks-dir', cli: 'claude' },\n    ]\n    const result = await runUninstall(items)\n\n    // user-hook.sh should still exist\n    expect(await fs.pathExists(path.join(hooksDir, 'user-hook.sh'))).toBe(true)\n    expect(result.removed).toHaveLength(0)\n  })\n\n  // ── Additional targeted tests for surviving string/condition mutants ────────\n\n  it('buildUninstallPlan: skills-dir item label contains \"skills\"', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    const p = getUninstallPaths()\n    await fs.ensureDir(p.CLAUDE_SKILLS)\n    await fs.writeFile(p.MANIFEST_PATH, '{}', 'utf-8')\n\n    const { items } = await buildUninstallPlan()\n    const skillsItem = items.find(i => i.type === 'skills-dir' && i.cli === 'claude')\n\n    expect(skillsItem?.label).toBeTruthy()\n    expect(skillsItem?.label).toContain('skills')\n  })\n\n  it('buildUninstallPlan: hooks-dir item label contains \"hooks\"', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    const p = getUninstallPaths()\n    await fs.ensureDir(path.join(p.CLAUDE_CONFIG, 'hooks'))\n    await fs.writeFile(p.MANIFEST_PATH, '{}', 'utf-8')\n\n    const { items } = await buildUninstallPlan()\n    const hooksItem = items.find(i => i.type === 'hooks-dir')\n\n    expect(hooksItem?.label).toBeTruthy()\n    expect(hooksItem?.label).toContain('hooks')\n  })\n\n  it('buildUninstallPlan: config-section item label contains \"javi-ai section\"', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    const p = getUninstallPaths()\n\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n    await fs.writeFile(path.join(configSrc, 'CLAUDE.md'), '# Claude', 'utf-8')\n\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n    await fs.writeFile(path.join(p.CLAUDE_CONFIG, 'CLAUDE.md'), '# Installed', 'utf-8')\n    await fs.writeFile(p.MANIFEST_PATH, '{}', 'utf-8')\n\n    const { items } = await buildUninstallPlan()\n    const configItem = items.find(i => i.type === 'config-section')\n\n    expect(configItem?.label).toBeTruthy()\n    expect(configItem?.label).toContain('javi-ai section')\n  })\n\n  it('hooks-dir item: hooksDir only added when it EXISTS (pathExists check)', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    const p = getUninstallPaths()\n    // Do NOT create hooks dir\n    await fs.writeFile(p.MANIFEST_PATH, '{}', 'utf-8')\n\n    const { items } = await buildUninstallPlan()\n    const hookItems = items.filter(i => i.type === 'hooks-dir')\n\n    expect(hookItems).toHaveLength(0)\n  })\n\n  it('config-section dest file must exist to be included', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    const p = getUninstallPaths()\n\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n    await fs.writeFile(path.join(configSrc, 'CLAUDE.md'), '# Claude', 'utf-8')\n\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n    // Do NOT create the dest file\n\n    await fs.writeFile(p.MANIFEST_PATH, '{}', 'utf-8')\n\n    const { items } = await buildUninstallPlan()\n    const configItems = items.filter(i => i.type === 'config-section')\n\n    // Since dest doesn't exist, no config-section items\n    expect(configItems).toHaveLength(0)\n  })\n\n  it('runUninstall: section join with \\\\n\\\\n (not empty string)', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    const content = `# Header\\n\\n${MARKER_START}\\nManaged\\n${MARKER_END}\\n\\n# Footer`\n    await fs.writeFile(configFile, content, 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    await runUninstall(items)\n\n    const remaining = await fs.readFile(configFile, 'utf-8')\n    // If join used '' instead of '\\n\\n', header and footer would be on same line\n    expect(remaining).toContain('# Header')\n    expect(remaining).toContain('# Footer')\n    // They should be separated by at least a newline\n    expect(remaining.indexOf('# Footer')).toBeGreaterThan(remaining.indexOf('# Header') + '# Header'.length)\n  })\n\n  it('runUninstall: result file ends with \\\\n after section removal', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    const content = `# Header\\n\\n${MARKER_START}\\nManaged\\n${MARKER_END}\\n\\n# Footer`\n    await fs.writeFile(configFile, content, 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    await runUninstall(items)\n\n    const remaining = await fs.readFile(configFile, 'utf-8')\n    expect(remaining.endsWith('\\n')).toBe(true)\n  })\n\n  it('runUninstall hooks: removed path contains hook filename with /', async () => {\n    const p = getUninstallPaths()\n    const hooksDir = path.join(p.tmpDir, 'hooks')\n    await fs.ensureDir(hooksDir)\n    await fs.writeFile(path.join(hooksDir, 'javi-hook.sh'), '#!/bin/sh', 'utf-8')\n\n    const hooksSrc = path.join(FIXED_ASSETS_ROOT, 'own', 'hooks', 'claude')\n    await fs.ensureDir(hooksSrc)\n    await fs.writeFile(path.join(hooksSrc, 'javi-hook.sh'), '#!/bin/sh', 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'hooks', path: hooksDir, type: 'hooks-dir', cli: 'claude' },\n    ]\n    const result = await runUninstall(items)\n\n    expect(result.removed).toHaveLength(1)\n    expect(result.removed[0]).toContain('/javi-hook.sh')\n  })\n\n  it('runUninstall: startIdx check — only start marker (no end) → no markers found → skipped', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    // Only start marker, no end marker\n    const content = `# Header\\n\\n${MARKER_START}\\nManaged section without end marker\\n# Footer`\n    await fs.writeFile(configFile, content, 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    const result = await runUninstall(items)\n\n    // File unchanged (only start marker, no end → treated as no markers)\n    expect(await fs.readFile(configFile, 'utf-8')).toBe(content)\n    expect(result.removed.some(r => r.includes('skipped') || r.includes('no javi-ai markers'))).toBe(true)\n  })\n\n  it('runUninstall: endIdx check — only end marker (no start) → no markers found → skipped', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    // Only end marker, no start marker\n    const content = `# Header\\nManaged section without start marker\\n${MARKER_END}\\n# Footer`\n    await fs.writeFile(configFile, content, 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    const result = await runUninstall(items)\n\n    // File unchanged\n    expect(await fs.readFile(configFile, 'utf-8')).toBe(content)\n    expect(result.removed.some(r => r.includes('skipped') || r.includes('no javi-ai markers'))).toBe(true)\n  })\n\n  it('runUninstall config-section: backup overwrite:true replaces file content', async () => {\n    const p = getUninstallPaths()\n    const configFile = path.join(p.CLAUDE_CONFIG, 'CLAUDE.md')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n    await fs.writeFile(configFile, `${MARKER_START}\\nManaged\\n${MARKER_END}`, 'utf-8')\n\n    const backupContent = '# Original content from backup'\n    const backupDir = path.join(p.BACKUP_DIR, '2024-06-01T10-00-00-000Z', 'claude')\n    await fs.ensureDir(backupDir)\n    await fs.writeFile(path.join(backupDir, 'CLAUDE.md'), backupContent, 'utf-8')\n\n    const items: UninstallItem[] = [\n      { label: 'claude config', path: configFile, type: 'config-section', cli: 'claude' },\n    ]\n    await runUninstall(items)\n\n    // Should be restored with the exact backup content (overwrite: true)\n    const restoredContent = await fs.readFile(configFile, 'utf-8')\n    expect(restoredContent).toBe(backupContent)\n  })\n})\n"},"src/installer/skills.test.ts":{"tests":[{"id":"154","name":"installSkillsForCLI returns [] for unknown cli"},{"id":"155","name":"installSkillsForCLI dryRun: returns correct skill names without creating files"},{"id":"156","name":"installSkillsForCLI dryRun: does not include dotfile directories"},{"id":"157","name":"installSkillsForCLI dryRun: does not include no-skill-dir (no SKILL.md)"},{"id":"158","name":"installSkillsForCLI installs upstream skill without EXTENSION.md (content exact match)"},{"id":"159","name":"installSkillsForCLI installs upstream skill WITH EXTENSION.md: content = SKILL.md + separator + EXTENSION.md"},{"id":"160","name":"installSkillsForCLI skips dotfile directories"},{"id":"161","name":"installSkillsForCLI skips _shared in main skill loop (but copies it via dedicated path)"},{"id":"162","name":"installSkillsForCLI copies _shared directory with overwrite"},{"id":"163","name":"installSkillsForCLI installs own skills"},{"id":"164","name":"installSkillsForCLI handles missing own/skills directory gracefully (no error)"},{"id":"165","name":"installSkillsForCLI handles missing upstream/skills directory: readdir throws (documents actual behavior)"}],"source":"/**\n * skills.test.ts — Integration tests for installSkillsForCLI\n *\n * Key design: ASSETS_ROOT is computed at module load time in skills.ts.\n * We redirect it by mocking the 'url' module's fileURLToPath.\n * We use vi.hoisted() with require() to create a fixed path that is available\n * inside the vi.mock() factory (which is hoisted above all module-level code).\n */\nimport { describe, it, expect, vi, beforeEach, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\n\n// vi.hoisted() runs before vi.mock() factories — use require() to access built-ins\nconst { FIXED_ASSETS_ROOT, FIXED_CLAUDE_DEST } = vi.hoisted(() => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const p = require('path')\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const o = require('os')\n  return {\n    FIXED_ASSETS_ROOT: p.join(o.tmpdir(), 'javi-ai-skills-test-suite') as string,\n    FIXED_CLAUDE_DEST: p.join(o.tmpdir(), 'javi-ai-skills-claude-dest-test') as string,\n  }\n})\n\nvi.mock('url', async (importOriginal) => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodePath = require('path')\n  const actual = await importOriginal<"+"typeof import('url')>()\n  return {\n    ...actual,\n    fileURLToPath: (url: string | URL) => {\n      const urlStr = url.toString()\n      if (urlStr.includes('skills') && !urlStr.includes('skills.test')) {\n        // skills.ts: ASSETS_ROOT = path.resolve(__dirname, '../../')\n        // return FIXED_ASSETS_ROOT/src/installer/skills.js\n        // __dirname = FIXED_ASSETS_ROOT/src/installer\n        // path.resolve(FIXED_ASSETS_ROOT/src/installer, '../../') = FIXED_ASSETS_ROOT ✓\n        return nodePath.join(FIXED_ASSETS_ROOT, 'src', 'installer', 'skills.js')\n      }\n      return actual.fileURLToPath(url)\n    },\n  }\n})\n\nvi.mock('../constants.js', () => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodePath = require('path')\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodeOs = require('os')\n  return {\n    CLI_OPTIONS: [\n      {\n        id: 'claude',\n        label: 'Claude Code',\n        configPath: nodePath.join(nodeOs.homedir(), '.claude'),\n        skillsPath: FIXED_CLAUDE_DEST,\n        available: true,\n      },\n    ],\n    MANIFEST_PATH: nodePath.join(nodeOs.tmpdir(), 'javi-ai-skills-manifest-test.json'),\n    BACKUP_DIR: nodePath.join(nodeOs.tmpdir(), 'javi-ai-skills-backups-test'),\n    MARKER_START: '<"+"!-- BEGIN JAVI-AI -->',\n    MARKER_END: '<"+"!-- END JAVI-AI -->',\n    HOME: nodeOs.homedir(),\n  }\n})\n\nimport { installSkillsForCLI } from './skills.js'\n\nasync function createAssetTree(): Promise<"+"void> {\n  await fs.remove(FIXED_ASSETS_ROOT)\n\n  const upstreamSkills = path.join(FIXED_ASSETS_ROOT, 'upstream', 'skills')\n\n  await fs.ensureDir(path.join(upstreamSkills, 'react-19'))\n  await fs.writeFile(path.join(upstreamSkills, 'react-19', 'SKILL.md'), '# React 19 Skill', 'utf-8')\n\n  await fs.ensureDir(path.join(upstreamSkills, 'typescript'))\n  await fs.writeFile(path.join(upstreamSkills, 'typescript', 'SKILL.md'), '# TypeScript Skill', 'utf-8')\n\n  await fs.ensureDir(path.join(upstreamSkills, 'sdd-explore'))\n  await fs.writeFile(path.join(upstreamSkills, 'sdd-explore', 'SKILL.md'), '# SDD Explore', 'utf-8')\n  await fs.writeFile(path.join(upstreamSkills, 'sdd-explore', 'EXTENSION.md'), '## Extension: Perspective', 'utf-8')\n\n  await fs.ensureDir(path.join(upstreamSkills, '_shared'))\n  await fs.writeFile(path.join(upstreamSkills, '_shared', 'persistence-contract.md'), '# Shared', 'utf-8')\n\n  await fs.ensureDir(path.join(upstreamSkills, '.dotfile'))\n  await fs.writeFile(path.join(upstreamSkills, '.dotfile', 'SKILL.md'), '# Dotfile', 'utf-8')\n\n  await fs.ensureDir(path.join(upstreamSkills, 'no-skill-dir'))\n  await fs.writeFile(path.join(upstreamSkills, 'no-skill-dir', 'README.md'), '# No skill', 'utf-8')\n\n  const ownSkills = path.join(FIXED_ASSETS_ROOT, 'own', 'skills')\n  await fs.ensureDir(path.join(ownSkills, 'skill-creator'))\n  await fs.writeFile(path.join(ownSkills, 'skill-creator', 'SKILL.md'), '# Skill Creator', 'utf-8')\n  await fs.ensureDir(path.join(ownSkills, 'obsidian-braindump'))\n  await fs.writeFile(path.join(ownSkills, 'obsidian-braindump', 'SKILL.md'), '# Obsidian', 'utf-8')\n}\n\ndescribe('installSkillsForCLI', () => {\n  beforeEach(async () => {\n    await createAssetTree()\n    await fs.remove(FIXED_CLAUDE_DEST)\n  })\n\n  afterEach(async () => {\n    await fs.remove(FIXED_CLAUDE_DEST)\n  })\n\n  it('returns [] for unknown cli', async () => {\n    // eslint-disable-next-line @typescript-eslint/no-explicit-any\n    const result = await installSkillsForCLI('unknown' as any, true)\n    expect(result).toEqual([])\n  })\n\n  it('dryRun: returns correct skill names without creating files', async () => {\n    const result = await installSkillsForCLI('claude', true)\n\n    expect(result).toContain('react-19')\n    expect(result).toContain('typescript')\n    expect(result).toContain('sdd-explore')\n    expect(result).toContain('_shared')\n    expect(result).toContain('skill-creator')\n    expect(result).toContain('obsidian-braindump')\n\n    expect(await fs.pathExists(FIXED_CLAUDE_DEST)).toBe(false)\n  })\n\n  it('dryRun: does not include dotfile directories', async () => {\n    const result = await installSkillsForCLI('claude', true)\n    expect(result).not.toContain('.dotfile')\n  })\n\n  it('dryRun: does not include no-skill-dir (no SKILL.md)', async () => {\n    const result = await installSkillsForCLI('claude', true)\n    expect(result).not.toContain('no-skill-dir')\n  })\n\n  it('installs upstream skill without EXTENSION.md (content exact match)', async () => {\n    await installSkillsForCLI('claude', false)\n    const content = await fs.readFile(path.join(FIXED_CLAUDE_DEST, 'react-19', 'SKILL.md'), 'utf-8')\n    expect(content).toBe('# React 19 Skill')\n  })\n\n  it('installs upstream skill WITH EXTENSION.md: content = SKILL.md + separator + EXTENSION.md', async () => {\n    await installSkillsForCLI('claude', false)\n    const content = await fs.readFile(path.join(FIXED_CLAUDE_DEST, 'sdd-explore', 'SKILL.md'), 'utf-8')\n    expect(content).toBe('# SDD Explore\\n\\n---\\n\\n## Extension: Perspective')\n  })\n\n  it('skips dotfile directories', async () => {\n    await installSkillsForCLI('claude', false)\n    expect(await fs.pathExists(path.join(FIXED_CLAUDE_DEST, '.dotfile'))).toBe(false)\n  })\n\n  it('skips _shared in main skill loop (but copies it via dedicated path)', async () => {\n    await installSkillsForCLI('claude', false)\n    expect(await fs.pathExists(path.join(FIXED_CLAUDE_DEST, '_shared'))).toBe(true)\n    expect(await fs.pathExists(path.join(FIXED_CLAUDE_DEST, '_shared', 'persistence-contract.md'))).toBe(true)\n  })\n\n  it('copies _shared directory with overwrite', async () => {\n    await installSkillsForCLI('claude', false)\n    await fs.writeFile(path.join(FIXED_CLAUDE_DEST, '_shared', 'persistence-contract.md'), 'Modified', 'utf-8')\n    await installSkillsForCLI('claude', false)\n    const content = await fs.readFile(path.join(FIXED_CLAUDE_DEST, '_shared', 'persistence-contract.md'), 'utf-8')\n    expect(content).toBe('# Shared')\n  })\n\n  it('installs own skills', async () => {\n    await installSkillsForCLI('claude', false)\n    expect(await fs.pathExists(path.join(FIXED_CLAUDE_DEST, 'skill-creator', 'SKILL.md'))).toBe(true)\n    expect(await fs.pathExists(path.join(FIXED_CLAUDE_DEST, 'obsidian-braindump', 'SKILL.md'))).toBe(true)\n  })\n\n  it('handles missing own/skills directory gracefully (no error)', async () => {\n    await fs.remove(path.join(FIXED_ASSETS_ROOT, 'own', 'skills'))\n    await expect(installSkillsForCLI('claude', false)).resolves.toBeDefined()\n  })\n\n  it('handles missing upstream/skills directory: readdir throws (documents actual behavior)', async () => {\n    await fs.remove(path.join(FIXED_ASSETS_ROOT, 'upstream', 'skills'))\n    await expect(installSkillsForCLI('claude', false)).rejects.toThrow()\n  })\n})\n"},"src/merger/json.test.ts":{"tests":[{"id":"166","name":"deepMerge (via mergeJsonFile) merges disjoint keys from both objects"},{"id":"167","name":"deepMerge (via mergeJsonFile) source scalar overwrites target scalar"},{"id":"168","name":"deepMerge (via mergeJsonFile) source scalar overwrites target object (non-null check)"},{"id":"169","name":"deepMerge (via mergeJsonFile) source object + null target → source wins (not recursed)"},{"id":"170","name":"deepMerge (via mergeJsonFile) null source value + object target → null wins (not recursed)"},{"id":"171","name":"deepMerge (via mergeJsonFile) recursively merges nested objects (2 levels)"},{"id":"172","name":"deepMerge (via mergeJsonFile) deeply nested objects 3+ levels"},{"id":"173","name":"deepMerge (via mergeJsonFile) array deduplication: primitive string values"},{"id":"174","name":"deepMerge (via mergeJsonFile) array deduplication: primitive number values"},{"id":"175","name":"deepMerge (via mergeJsonFile) array deduplication: object values by JSON equality (same content = same)"},{"id":"176","name":"deepMerge (via mergeJsonFile) array deduplication: object values by reference (different content = both kept)"},{"id":"177","name":"deepMerge (via mergeJsonFile) array union: target items come first"},{"id":"178","name":"deepMerge (via mergeJsonFile) source array + target scalar → source wins (falls to else)"},{"id":"179","name":"deepMerge (via mergeJsonFile) source scalar + target array → source wins (falls to else)"},{"id":"180","name":"deepMerge (via mergeJsonFile) empty source → returns copy of target"},{"id":"181","name":"deepMerge (via mergeJsonFile) empty target → returns copy of source"},{"id":"182","name":"deepMerge (via mergeJsonFile) both empty → returns empty object"},{"id":"183","name":"deepMerge (via mergeJsonFile) boolean false source value is preserved (not treated as falsy)"},{"id":"184","name":"deepMerge (via mergeJsonFile) number 0 source value is preserved"},{"id":"185","name":"deepMerge (via mergeJsonFile) empty string source value is preserved"},{"id":"186","name":"mergeJsonFile (integration) target absent: copies source as-is"},{"id":"187","name":"mergeJsonFile (integration) target present, no backup: merges and writes"},{"id":"188","name":"mergeJsonFile (integration) target present, backup requested: backup created before merge, merge correct"},{"id":"189","name":"mergeJsonFile (integration) nested merge correctness"},{"id":"190","name":"mergeJsonFile (integration) array dedup correctness end-to-end"},{"id":"191","name":"mergeJsonFile (integration) throws on invalid JSON in source"},{"id":"192","name":"mergeJsonFile (integration) throws on invalid JSON in target"}],"source":"import { describe, it, expect, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\nimport crypto from 'crypto'\n\n// deepMerge is not exported — we test it through mergeJsonFile for integration\n// but we need a way to unit-test it. Since it's local, we import the whole module\n// and access its internals via a re-export shim or test through mergeJsonFile.\n// The spec says: \"import directly from merger/json.ts — it's a named export\"\n// But looking at the source, deepMerge is NOT exported. We'll test it via mergeJsonFile\n// for the integration tests, and create a local re-export for unit tests.\n\n// We use the module's internals by dynamic import trick. Since vitest supports\n// module mocking and we're in ESM, we'll just test deepMerge via a thin wrapper.\n// Actually, the instruction says \"it's a named export\" — let's add the export first.\n// But we can't modify source files in test. We'll import it and if not exported,\n// test through integration. Let's try importing it — if it fails, we test via files.\n\nimport { mergeJsonFile } from './json.js'\n\n// ─── Helper to create a unique temp dir ───────────────────────────────────────\nfunction makeTempDir(): string {\n  return path.join(os.tmpdir(), `javi-ai-test-${crypto.randomUUID()}`)\n}\n\n// ─── Unit tests for deepMerge via a re-exported thin wrapper ─────────────────\n// We test deepMerge by calling mergeJsonFile with temp files and inspecting output.\n// This covers the merge logic as pure unit tests.\n\nasync function runMerge(target: object, source: object): Promise<"+"object> {\n  const tmpDir = makeTempDir()\n  await fs.ensureDir(tmpDir)\n  const srcFile = path.join(tmpDir, 'source.json')\n  const tgtFile = path.join(tmpDir, 'target.json')\n  await fs.writeFile(srcFile, JSON.stringify(source), 'utf-8')\n  await fs.writeFile(tgtFile, JSON.stringify(target), 'utf-8')\n  await mergeJsonFile(tgtFile, srcFile)\n  const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8'))\n  await fs.remove(tmpDir)\n  return result\n}\n\ndescribe('deepMerge (via mergeJsonFile)', () => {\n  it('merges disjoint keys from both objects', async () => {\n    const result = await runMerge({ a: 1 }, { b: 2 })\n    expect(result).toEqual({ a: 1, b: 2 })\n  })\n\n  it('source scalar overwrites target scalar', async () => {\n    const result = await runMerge({ x: 'old' }, { x: 'new' })\n    expect(result).toEqual({ x: 'new' })\n  })\n\n  it('source scalar overwrites target object (non-null check)', async () => {\n    const result = await runMerge({ x: { nested: true } }, { x: 'flat' })\n    expect(result).toEqual({ x: 'flat' })\n  })\n\n  it('source object + null target → source wins (not recursed)', async () => {\n    const result = await runMerge({ x: null }, { x: { nested: true } })\n    expect(result).toEqual({ x: { nested: true } })\n  })\n\n  it('null source value + object target → null wins (not recursed)', async () => {\n    const result = await runMerge({ x: { nested: true } }, { x: null })\n    expect(result).toEqual({ x: null })\n  })\n\n  it('recursively merges nested objects (2 levels)', async () => {\n    const result = await runMerge(\n      { obj: { a: 1, b: 2 } },\n      { obj: { b: 99, c: 3 } }\n    )\n    expect(result).toEqual({ obj: { a: 1, b: 99, c: 3 } })\n  })\n\n  it('deeply nested objects 3+ levels', async () => {\n    const result = await runMerge(\n      { a: { b: { c: { d: 1 } } } },\n      { a: { b: { c: { e: 2 } } } }\n    )\n    expect(result).toEqual({ a: { b: { c: { d: 1, e: 2 } } } })\n  })\n\n  it('array deduplication: primitive string values', async () => {\n    const result = await runMerge({ arr: ['a', 'b'] }, { arr: ['b', 'c'] }) as { arr: string[] }\n    expect(result.arr).toContain('a')\n    expect(result.arr).toContain('b')\n    expect(result.arr).toContain('c')\n    // b appears only once\n    expect(result.arr.filter(x => x === 'b').length).toBe(1)\n  })\n\n  it('array deduplication: primitive number values', async () => {\n    const result = await runMerge({ arr: [1, 2] }, { arr: [2, 3] }) as { arr: number[] }\n    expect(result.arr).toEqual(expect.arrayContaining([1, 2, 3]))\n    expect(result.arr.filter(x => x === 2).length).toBe(1)\n  })\n\n  it('array deduplication: object values by JSON equality (same content = same)', async () => {\n    const result = await runMerge(\n      { arr: [{ id: 1 }] },\n      { arr: [{ id: 1 }] }\n    ) as { arr: object[] }\n    expect(result.arr.length).toBe(1)\n  })\n\n  it('array deduplication: object values by reference (different content = both kept)', async () => {\n    const result = await runMerge(\n      { arr: [{ id: 1 }] },\n      { arr: [{ id: 2 }] }\n    ) as { arr: object[] }\n    expect(result.arr.length).toBe(2)\n  })\n\n  it('array union: target items come first', async () => {\n    const result = await runMerge({ arr: ['a'] }, { arr: ['b'] }) as { arr: string[] }\n    expect(result.arr[0]).toBe('a')\n    expect(result.arr[1]).toBe('b')\n  })\n\n  it('source array + target scalar → source wins (falls to else)', async () => {\n    const result = await runMerge({ x: 'scalar' }, { x: [1, 2, 3] })\n    expect(result).toEqual({ x: [1, 2, 3] })\n  })\n\n  it('source scalar + target array → source wins (falls to else)', async () => {\n    const result = await runMerge({ x: [1, 2, 3] }, { x: 'scalar' })\n    expect(result).toEqual({ x: 'scalar' })\n  })\n\n  it('empty source → returns copy of target', async () => {\n    const result = await runMerge({ a: 1, b: 2 }, {})\n    expect(result).toEqual({ a: 1, b: 2 })\n  })\n\n  it('empty target → returns copy of source', async () => {\n    const result = await runMerge({}, { a: 1, b: 2 })\n    expect(result).toEqual({ a: 1, b: 2 })\n  })\n\n  it('both empty → returns empty object', async () => {\n    const result = await runMerge({}, {})\n    expect(result).toEqual({})\n  })\n\n  it('boolean false source value is preserved (not treated as falsy)', async () => {\n    const result = await runMerge({ flag: true }, { flag: false })\n    expect(result).toEqual({ flag: false })\n  })\n\n  it('number 0 source value is preserved', async () => {\n    const result = await runMerge({ count: 5 }, { count: 0 })\n    expect(result).toEqual({ count: 0 })\n  })\n\n  it('empty string source value is preserved', async () => {\n    const result = await runMerge({ name: 'hello' }, { name: '' })\n    expect(result).toEqual({ name: '' })\n  })\n})\n\n// ─── Integration tests for mergeJsonFile ─────────────────────────────────────\n\ndescribe('mergeJsonFile (integration)', () => {\n  let tmpDir: string\n\n  afterEach(async () => {\n    if (tmpDir) await fs.remove(tmpDir)\n  })\n\n  function setup(): { srcFile: string; tgtFile: string; backupFile: string } {\n    tmpDir = makeTempDir()\n    return {\n      srcFile: path.join(tmpDir, 'source.json'),\n      tgtFile: path.join(tmpDir, 'target.json'),\n      backupFile: path.join(tmpDir, 'backup.json'),\n    }\n  }\n\n  it('target absent: copies source as-is', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    const src = { hello: 'world', num: 42 }\n    await fs.writeFile(srcFile, JSON.stringify(src), 'utf-8')\n\n    await mergeJsonFile(tgtFile, srcFile)\n\n    const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8'))\n    expect(result).toEqual(src)\n  })\n\n  it('target present, no backup: merges and writes', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    await fs.writeFile(tgtFile, JSON.stringify({ a: 1 }), 'utf-8')\n    await fs.writeFile(srcFile, JSON.stringify({ b: 2 }), 'utf-8')\n\n    await mergeJsonFile(tgtFile, srcFile)\n\n    const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8'))\n    expect(result).toEqual({ a: 1, b: 2 })\n  })\n\n  it('target present, backup requested: backup created before merge, merge correct', async () => {\n    const { srcFile, tgtFile, backupFile } = setup()\n    await fs.ensureDir(tmpDir)\n    const original = { x: 'original' }\n    await fs.writeFile(tgtFile, JSON.stringify(original), 'utf-8')\n    await fs.writeFile(srcFile, JSON.stringify({ y: 'new' }), 'utf-8')\n\n    await mergeJsonFile(tgtFile, srcFile, backupFile)\n\n    // backup should be the original target\n    const backup = JSON.parse(await fs.readFile(backupFile, 'utf-8'))\n    expect(backup).toEqual(original)\n\n    // target should be merged\n    const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8'))\n    expect(result).toEqual({ x: 'original', y: 'new' })\n  })\n\n  it('nested merge correctness', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    await fs.writeFile(tgtFile, JSON.stringify({ settings: { theme: 'dark', lang: 'en' } }), 'utf-8')\n    await fs.writeFile(srcFile, JSON.stringify({ settings: { lang: 'es', extra: true } }), 'utf-8')\n\n    await mergeJsonFile(tgtFile, srcFile)\n\n    const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8'))\n    expect(result).toEqual({ settings: { theme: 'dark', lang: 'es', extra: true } })\n  })\n\n  it('array dedup correctness end-to-end', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    await fs.writeFile(tgtFile, JSON.stringify({ tags: ['a', 'b', 'c'] }), 'utf-8')\n    await fs.writeFile(srcFile, JSON.stringify({ tags: ['b', 'd'] }), 'utf-8')\n\n    await mergeJsonFile(tgtFile, srcFile)\n\n    const result = JSON.parse(await fs.readFile(tgtFile, 'utf-8')) as { tags: string[] }\n    expect(result.tags).toHaveLength(4)\n    expect(result.tags).toContain('a')\n    expect(result.tags).toContain('b')\n    expect(result.tags).toContain('c')\n    expect(result.tags).toContain('d')\n    expect(result.tags.filter(x => x === 'b').length).toBe(1)\n  })\n\n  it('throws on invalid JSON in source', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    await fs.writeFile(srcFile, 'NOT VALID JSON', 'utf-8')\n\n    await expect(mergeJsonFile(tgtFile, srcFile)).rejects.toThrow()\n  })\n\n  it('throws on invalid JSON in target', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    await fs.writeFile(tgtFile, 'BROKEN JSON', 'utf-8')\n    await fs.writeFile(srcFile, JSON.stringify({ ok: true }), 'utf-8')\n\n    await expect(mergeJsonFile(tgtFile, srcFile)).rejects.toThrow()\n  })\n})\n"},"src/merger/markdown.test.ts":{"tests":[{"id":"193","name":"mergeMarkdownFile (integration) target absent: creates file with MARKER_START + content + MARKER_END"},{"id":"194","name":"mergeMarkdownFile (integration) target present, both markers: replaces ONLY section between markers, preserves before and after"},{"id":"195","name":"mergeMarkdownFile (integration) target present, no markers: appends block at end, original content intact"},{"id":"196","name":"mergeMarkdownFile (integration) target present, only start marker (no end): treats as no-markers, appends"},{"id":"197","name":"mergeMarkdownFile (integration) backup created before any modification (verify backup file matches original)"},{"id":"198","name":"mergeMarkdownFile (integration) content before markers is preserved character-for-character"},{"id":"199","name":"mergeMarkdownFile (integration) content after markers is preserved character-for-character"},{"id":"200","name":"mergeMarkdownFile (integration) running twice: second run replaces first run section (idempotent)"},{"id":"201","name":"mergeMarkdownFile (integration) MARKER_START and MARKER_END themselves are not duplicated on double-run"},{"id":"202","name":"mergeMarkdownFile (integration) both startIdx and endIdx must be present for replace (only end marker missing → appends)"},{"id":"203","name":"mergeMarkdownFile (integration) marker replacement: content between markers is exactly replaced (no extra content)"}],"source":"import { describe, it, expect, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\nimport crypto from 'crypto'\n\nimport { mergeMarkdownFile } from './markdown.js'\nimport { MARKER_START, MARKER_END } from '../constants.js'\n\nfunction makeTempDir(): string {\n  return path.join(os.tmpdir(), `javi-ai-md-test-${crypto.randomUUID()}`)\n}\n\ndescribe('mergeMarkdownFile (integration)', () => {\n  let tmpDir: string\n\n  afterEach(async () => {\n    if (tmpDir) await fs.remove(tmpDir)\n  })\n\n  function setup(): { srcFile: string; tgtFile: string; backupFile: string } {\n    tmpDir = makeTempDir()\n    return {\n      srcFile: path.join(tmpDir, 'source.md'),\n      tgtFile: path.join(tmpDir, 'target.md'),\n      backupFile: path.join(tmpDir, 'backup.md'),\n    }\n  }\n\n  it('target absent: creates file with MARKER_START + content + MARKER_END', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n    const content = '## My Section\\nSome content here.'\n    await fs.writeFile(srcFile, content, 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    expect(result).toContain(MARKER_START)\n    expect(result).toContain(content)\n    expect(result).toContain(MARKER_END)\n    // Verify order\n    const startIdx = result.indexOf(MARKER_START)\n    const endIdx = result.indexOf(MARKER_END)\n    const contentIdx = result.indexOf(content)\n    expect(startIdx).toBeLessThan(contentIdx)\n    expect(contentIdx).toBeLessThan(endIdx)\n  })\n\n  it('target present, both markers: replaces ONLY section between markers, preserves before and after', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const before = '# Original Header\\n\\nSome existing content.\\n\\n'\n    const after = '\\n\\n## Trailing Section\\nKeep this.\\n'\n    const oldInner = 'Old managed content'\n    const existingTarget = `${before}${MARKER_START}\\n${oldInner}\\n${MARKER_END}${after}`\n    await fs.writeFile(tgtFile, existingTarget, 'utf-8')\n\n    const newContent = 'Brand new managed content'\n    await fs.writeFile(srcFile, newContent, 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n\n    // Before is preserved\n    expect(result).toContain('Original Header')\n    expect(result).toContain('Some existing content.')\n\n    // After is preserved\n    expect(result).toContain('Trailing Section')\n    expect(result).toContain('Keep this.')\n\n    // New content is present\n    expect(result).toContain('Brand new managed content')\n\n    // Old content is gone\n    expect(result).not.toContain(oldInner)\n\n    // Markers appear exactly once\n    expect(result.split(MARKER_START).length - 1).toBe(1)\n    expect(result.split(MARKER_END).length - 1).toBe(1)\n  })\n\n  it('target present, no markers: appends block at end, original content intact', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const original = '# Existing File\\nSome user content.'\n    await fs.writeFile(tgtFile, original, 'utf-8')\n    await fs.writeFile(srcFile, 'Appended managed content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    expect(result).toContain('Existing File')\n    expect(result).toContain('Some user content.')\n    expect(result).toContain(MARKER_START)\n    expect(result).toContain('Appended managed content')\n    expect(result).toContain(MARKER_END)\n\n    // Original comes before the markers\n    const origIdx = result.indexOf('Existing File')\n    const markerIdx = result.indexOf(MARKER_START)\n    expect(origIdx).toBeLessThan(markerIdx)\n  })\n\n  it('target present, only start marker (no end): treats as no-markers, appends', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    // Only MARKER_START, no MARKER_END\n    const original = `# File\\n${MARKER_START}\\nOrphan content`\n    await fs.writeFile(tgtFile, original, 'utf-8')\n    await fs.writeFile(srcFile, 'New managed', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    // Appended, not replaced\n    expect(result).toContain('Orphan content')\n    expect(result).toContain('New managed')\n    // The appended block adds another MARKER_START\n    expect(result.split(MARKER_START).length - 1).toBeGreaterThanOrEqual(1)\n  })\n\n  it('backup created before any modification (verify backup file matches original)', async () => {\n    const { srcFile, tgtFile, backupFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const original = '# Original Content\\nDo not lose this.'\n    await fs.writeFile(tgtFile, original, 'utf-8')\n    await fs.writeFile(srcFile, 'New content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile, backupFile)\n\n    const backup = await fs.readFile(backupFile, 'utf-8')\n    expect(backup).toBe(original)\n  })\n\n  it('content before markers is preserved character-for-character', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const before = '# Exact Header\\n\\nLine 1.\\nLine 2.\\n\\n'\n    const existing = `${before}${MARKER_START}\\nold\\n${MARKER_END}`\n    await fs.writeFile(tgtFile, existing, 'utf-8')\n    await fs.writeFile(srcFile, 'new content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    expect(result.startsWith(before)).toBe(true)\n  })\n\n  it('content after markers is preserved character-for-character', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const after = '\\n\\n# After Section\\n\\nTrailing text.\\n'\n    const existing = `${MARKER_START}\\nold\\n${MARKER_END}${after}`\n    await fs.writeFile(tgtFile, existing, 'utf-8')\n    await fs.writeFile(srcFile, 'new content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    const endMarkerIdx = result.indexOf(MARKER_END)\n    const afterMarker = result.substring(endMarkerIdx + MARKER_END.length)\n    expect(afterMarker).toBe(after)\n  })\n\n  it('running twice: second run replaces first run section (idempotent)', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const original = '# Header\\n\\n'\n    await fs.writeFile(tgtFile, original, 'utf-8')\n    await fs.writeFile(srcFile, 'Managed content', 'utf-8')\n\n    // First run (appends since no markers)\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    // Second run (should replace the section)\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n\n    // Markers appear exactly once each\n    expect(result.split(MARKER_START).length - 1).toBe(1)\n    expect(result.split(MARKER_END).length - 1).toBe(1)\n\n    // Content appears exactly once\n    expect(result.split('Managed content').length - 1).toBe(1)\n  })\n\n  it('MARKER_START and MARKER_END themselves are not duplicated on double-run', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const original = '# Doc\\n\\nUser text.\\n'\n    await fs.writeFile(tgtFile, original, 'utf-8')\n    await fs.writeFile(srcFile, 'Auto content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    expect(result.split(MARKER_START).length - 1).toBe(1)\n    expect(result.split(MARKER_END).length - 1).toBe(1)\n  })\n\n  it('both startIdx and endIdx must be present for replace (only end marker missing → appends)', async () => {\n    // Tests that startIdx !== -1 && endIdx !== -1 is a conjunction (both required)\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    // Has END marker but no START marker\n    const contentWithOnlyEnd = `# Header\\n${MARKER_END}\\nFooter`\n    await fs.writeFile(tgtFile, contentWithOnlyEnd, 'utf-8')\n    await fs.writeFile(srcFile, 'New content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    // Should APPEND (no replace), because startIdx === -1\n    expect(result).toContain('# Header')\n    expect(result).toContain(MARKER_END)\n    // Content appended at the end\n    expect(result).toContain('New content')\n  })\n\n  it('marker replacement: content between markers is exactly replaced (no extra content)', async () => {\n    const { srcFile, tgtFile } = setup()\n    await fs.ensureDir(tmpDir)\n\n    const before = '# Before\\n'\n    const oldInner = 'Old managed content\\nMultiple lines\\n'\n    const existing = `${before}${MARKER_START}\\n${oldInner}${MARKER_END}\\n# After\\n`\n    await fs.writeFile(tgtFile, existing, 'utf-8')\n    await fs.writeFile(srcFile, 'New managed content', 'utf-8')\n\n    await mergeMarkdownFile(tgtFile, srcFile)\n\n    const result = await fs.readFile(tgtFile, 'utf-8')\n    expect(result).not.toContain(oldInner.trim())\n    expect(result).toContain('New managed content')\n    expect(result).toContain('# Before')\n    expect(result).toContain('# After')\n  })\n})\n"},"src/installer/manifest.test.ts":{"tests":[{"id":"204","name":"readManifest returns DEFAULT_MANIFEST when file does not exist"},{"id":"205","name":"readManifest returns DEFAULT_MANIFEST version \"0.1.0\" when file does not exist"},{"id":"206","name":"readManifest returns DEFAULT_MANIFEST when file has invalid JSON"},{"id":"207","name":"readManifest default manifest version is exactly \"0.1.0\" (not empty) on parse error"},{"id":"208","name":"readManifest returns parsed manifest when file is valid"},{"id":"209","name":"writeManifest creates directory if it does not exist"},{"id":"210","name":"writeManifest writes pretty-printed JSON (2 spaces)"},{"id":"211","name":"writeManifest content is correctly serialized"},{"id":"212","name":"readManifest — fresh copy (surviving mutant: DEFAULT_MANIFEST spread) returns a fresh copy each time — mutating result does not affect subsequent call"},{"id":"213","name":"readManifest — fresh copy (surviving mutant: DEFAULT_MANIFEST spread) two calls return structurally equal but distinct objects"},{"id":"214","name":"readManifest — fresh copy (surviving mutant: DEFAULT_MANIFEST spread) default manifest has empty skills object — mutating it does not leak to next call"}],"source":"import { describe, it, expect, vi, beforeEach, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\n\n// Use require() inside mock factory to avoid import hoisting TDZ\nvi.mock('../constants.js', () => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodePath = require('path') as typeof import('path')\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodeOs = require('os') as typeof import('os')\n  const tmpBase = nodePath.join(nodeOs.tmpdir(), 'javi-ai-manifest-test-fixed')\n  return {\n    MANIFEST_PATH: nodePath.join(tmpBase, 'manifest.json'),\n    BACKUP_DIR: nodePath.join(nodeOs.tmpdir(), 'javi-ai-manifest-backups'),\n    MARKER_START: '<"+"!-- BEGIN JAVI-AI -->',\n    MARKER_END: '<"+"!-- END JAVI-AI -->',\n    HOME: nodeOs.homedir(),\n    CLI_OPTIONS: [],\n  }\n})\n\nimport { readManifest, writeManifest } from './manifest.js'\nimport type { Manifest } from '../types/index.js'\n\nconst MOCK_TMPBASE = path.join(os.tmpdir(), 'javi-ai-manifest-test-fixed')\nconst MOCK_MANIFEST_PATH = path.join(MOCK_TMPBASE, 'manifest.json')\n\nconst DEFAULT_MANIFEST_SHAPE = {\n  version: expect.any(String),\n  installedAt: expect.any(String),\n  updatedAt: expect.any(String),\n  clis: expect.any(Array),\n  skills: expect.any(Object),\n}\n\ndescribe('readManifest', () => {\n  beforeEach(async () => {\n    await fs.ensureDir(MOCK_TMPBASE)\n    await fs.remove(MOCK_MANIFEST_PATH)\n  })\n\n  afterEach(async () => {\n    await fs.remove(MOCK_MANIFEST_PATH)\n  })\n\n  it('returns DEFAULT_MANIFEST when file does not exist', async () => {\n    const result = await readManifest()\n    expect(result).toMatchObject(DEFAULT_MANIFEST_SHAPE)\n    expect(result.clis).toEqual([])\n    expect(result.skills).toEqual({})\n  })\n\n  it('returns DEFAULT_MANIFEST version \"0.1.0\" when file does not exist', async () => {\n    const result = await readManifest()\n    expect(result.version).toBe('0.1.0')\n  })\n\n  it('returns DEFAULT_MANIFEST when file has invalid JSON', async () => {\n    await fs.writeFile(MOCK_MANIFEST_PATH, 'NOT VALID JSON', 'utf-8')\n    const result = await readManifest()\n    expect(result).toMatchObject(DEFAULT_MANIFEST_SHAPE)\n    expect(result.clis).toEqual([])\n  })\n\n  it('default manifest version is exactly \"0.1.0\" (not empty) on parse error', async () => {\n    await fs.writeFile(MOCK_MANIFEST_PATH, '{ invalid json', 'utf-8')\n    const result = await readManifest()\n    expect(result.version).toBe('0.1.0')\n    expect(result.version.length).toBeGreaterThan(0)\n  })\n\n  it('returns parsed manifest when file is valid', async () => {\n    const manifest: Manifest = {\n      version: '1.0.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-06-01T00:00:00.000Z',\n      clis: ['claude', 'gemini'],\n      skills: {\n        'react-19': {\n          name: 'react-19',\n          version: '1.0',\n          source: 'upstream',\n          installedAt: '2024-01-01T00:00:00.000Z',\n        },\n      },\n    }\n    await fs.writeFile(MOCK_MANIFEST_PATH, JSON.stringify(manifest), 'utf-8')\n\n    const result = await readManifest()\n    expect(result).toEqual(manifest)\n  })\n})\n\ndescribe('writeManifest', () => {\n  beforeEach(async () => {\n    await fs.remove(MOCK_MANIFEST_PATH)\n    await fs.remove(MOCK_TMPBASE)\n  })\n\n  afterEach(async () => {\n    await fs.remove(MOCK_TMPBASE)\n  })\n\n  it('creates directory if it does not exist', async () => {\n    const manifest: Manifest = {\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    }\n\n    await writeManifest(manifest)\n\n    expect(await fs.pathExists(MOCK_MANIFEST_PATH)).toBe(true)\n  })\n\n  it('writes pretty-printed JSON (2 spaces)', async () => {\n    const manifest: Manifest = {\n      version: '0.1.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-01-01T00:00:00.000Z',\n      clis: ['claude'],\n      skills: {},\n    }\n\n    await writeManifest(manifest)\n\n    const raw = await fs.readFile(MOCK_MANIFEST_PATH, 'utf-8')\n    expect(raw).toBe(JSON.stringify(manifest, null, 2))\n  })\n\n  it('content is correctly serialized', async () => {\n    const manifest: Manifest = {\n      version: '2.0.0',\n      installedAt: '2025-01-01T00:00:00.000Z',\n      updatedAt: '2025-06-01T00:00:00.000Z',\n      clis: ['opencode', 'gemini'],\n      skills: {\n        typescript: {\n          name: 'typescript',\n          version: '2.0',\n          source: 'own',\n          installedAt: '2025-01-01T00:00:00.000Z',\n          checksum: 'abc123',\n        },\n      },\n    }\n\n    await writeManifest(manifest)\n\n    const read = JSON.parse(await fs.readFile(MOCK_MANIFEST_PATH, 'utf-8'))\n    expect(read).toEqual(manifest)\n  })\n})\n\ndescribe('readManifest — fresh copy (surviving mutant: DEFAULT_MANIFEST spread)', () => {\n  beforeEach(async () => {\n    await fs.remove(MOCK_MANIFEST_PATH)\n    await fs.remove(MOCK_TMPBASE)\n    await fs.ensureDir(MOCK_TMPBASE)\n  })\n\n  afterEach(async () => {\n    await fs.remove(MOCK_MANIFEST_PATH)\n  })\n\n  it('returns a fresh copy each time — mutating result does not affect subsequent call', async () => {\n    // First call: get the default manifest\n    const first = await readManifest()\n    // Mutate it\n    first.clis.push('claude' as import('../types/index.js').CLI)\n    first.version = 'MUTATED'\n\n    // Second call should return a fresh default (unaffected)\n    const second = await readManifest()\n    expect(second.clis).toEqual([])\n    expect(second.version).not.toBe('MUTATED')\n  })\n\n  it('two calls return structurally equal but distinct objects', async () => {\n    const a = await readManifest()\n    const b = await readManifest()\n    expect(a).toEqual(b)\n    expect(a).not.toBe(b) // different references\n    expect(a.clis).not.toBe(b.clis) // arrays are also distinct\n  })\n\n  it('default manifest has empty skills object — mutating it does not leak to next call', async () => {\n    const first = await readManifest()\n    first.skills['hack'] = {\n      name: 'hack',\n      version: '0',\n      source: 'own',\n      installedAt: new Date().toISOString(),\n    }\n\n    const second = await readManifest()\n    expect(second.skills).toEqual({})\n    expect('hack' in second.skills).toBe(false)\n  })\n})\n"},"src/commands/update.test.ts":{"tests":[{"id":"215","name":"runUpdate returns early result when manifest has no CLIs"},{"id":"216","name":"runUpdate calls runInstall with manifest CLIs and all 4 features"},{"id":"217","name":"runUpdate passes dryRun: true when option is set"},{"id":"218","name":"runUpdate trackStep: first step is pushed to steps array"},{"id":"219","name":"runUpdate trackStep: second call with same id replaces first (upsert by id)"},{"id":"220","name":"runUpdate trackStep: step with new id is appended"},{"id":"221","name":"runUpdate onStep is called for every step update"},{"id":"222","name":"runUpdate returns { clis, steps } with correct shape"},{"id":"223","name":"runUpdate defaults dryRun to false when not specified"}],"source":"import { describe, it, expect, vi, beforeEach } from 'vitest'\n\n// Mock runInstall before importing update\nvi.mock('../installer/index.js', () => ({\n  runInstall: vi.fn(),\n}))\n\n// Mock readManifest\nvi.mock('../installer/manifest.js', () => ({\n  readManifest: vi.fn(),\n  writeManifest: vi.fn(),\n}))\n\nimport { runUpdate } from './update.js'\nimport { runInstall } from '../installer/index.js'\nimport { readManifest } from '../installer/manifest.js'\nimport type { InstallStep } from '../types/index.js'\n\nconst mockRunInstall = vi.mocked(runInstall)\nconst mockReadManifest = vi.mocked(readManifest)\n\ndescribe('runUpdate', () => {\n  beforeEach(() => {\n    vi.clearAllMocks()\n  })\n\n  it('returns early result when manifest has no CLIs', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    })\n\n    const onStep = vi.fn()\n    const result = await runUpdate({}, onStep)\n\n    expect(result).toEqual({ clis: [], steps: [] })\n    expect(mockRunInstall).not.toHaveBeenCalled()\n    expect(onStep).not.toHaveBeenCalled()\n  })\n\n  it('calls runInstall with manifest CLIs and all 4 features', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude', 'gemini'],\n      skills: {},\n    })\n    mockRunInstall.mockResolvedValue(undefined)\n\n    const onStep = vi.fn()\n    await runUpdate({ dryRun: false }, onStep)\n\n    expect(mockRunInstall).toHaveBeenCalledWith(\n      expect.objectContaining({\n        clis: ['claude', 'gemini'],\n        features: ['skills', 'orchestrators', 'configs', 'hooks'],\n        dryRun: false,\n        backup: true,\n      }),\n      expect.any(Function)\n    )\n  })\n\n  it('passes dryRun: true when option is set', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n    mockRunInstall.mockResolvedValue(undefined)\n\n    await runUpdate({ dryRun: true }, vi.fn())\n\n    expect(mockRunInstall).toHaveBeenCalledWith(\n      expect.objectContaining({ dryRun: true }),\n      expect.any(Function)\n    )\n  })\n\n  it('trackStep: first step is pushed to steps array', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n\n    // Capture the trackStep function passed to runInstall\n    let capturedTrackStep: ((step: InstallStep) => void) | undefined\n    mockRunInstall.mockImplementation(async (_, trackStep) => {\n      capturedTrackStep = trackStep\n      trackStep({ id: 'step-1', label: 'First step', status: 'running' })\n    })\n\n    const result = await runUpdate({}, vi.fn())\n\n    expect(result.steps).toHaveLength(1)\n    expect(result.steps[0]).toEqual({ id: 'step-1', label: 'First step', status: 'running' })\n  })\n\n  it('trackStep: second call with same id replaces first (upsert by id)', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n\n    mockRunInstall.mockImplementation(async (_, trackStep) => {\n      trackStep({ id: 'step-1', label: 'Step', status: 'running' })\n      trackStep({ id: 'step-1', label: 'Step', status: 'done' })\n    })\n\n    const result = await runUpdate({}, vi.fn())\n\n    expect(result.steps).toHaveLength(1)\n    expect(result.steps[0]!.status).toBe('done')\n  })\n\n  it('trackStep: step with new id is appended', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n\n    mockRunInstall.mockImplementation(async (_, trackStep) => {\n      trackStep({ id: 'step-1', label: 'First', status: 'done' })\n      trackStep({ id: 'step-2', label: 'Second', status: 'done' })\n    })\n\n    const result = await runUpdate({}, vi.fn())\n\n    expect(result.steps).toHaveLength(2)\n    expect(result.steps[0]!.id).toBe('step-1')\n    expect(result.steps[1]!.id).toBe('step-2')\n  })\n\n  it('onStep is called for every step update', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n\n    mockRunInstall.mockImplementation(async (_, trackStep) => {\n      trackStep({ id: 'a', label: 'A', status: 'running' })\n      trackStep({ id: 'a', label: 'A', status: 'done' })\n      trackStep({ id: 'b', label: 'B', status: 'running' })\n    })\n\n    const onStep = vi.fn()\n    await runUpdate({}, onStep)\n\n    // onStep should be called 3 times (once per trackStep call)\n    expect(onStep).toHaveBeenCalledTimes(3)\n  })\n\n  it('returns { clis, steps } with correct shape', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude', 'opencode'],\n      skills: {},\n    })\n\n    mockRunInstall.mockImplementation(async (_, trackStep) => {\n      trackStep({ id: 'claude-skills', label: 'Skills', status: 'done' })\n    })\n\n    const result = await runUpdate({}, vi.fn())\n\n    expect(result).toHaveProperty('clis')\n    expect(result).toHaveProperty('steps')\n    expect(result.clis).toEqual(['claude', 'opencode'])\n    expect(Array.isArray(result.steps)).toBe(true)\n  })\n\n  it('defaults dryRun to false when not specified', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: ['claude'],\n      skills: {},\n    })\n    mockRunInstall.mockResolvedValue(undefined)\n\n    await runUpdate({}, vi.fn())\n\n    expect(mockRunInstall).toHaveBeenCalledWith(\n      expect.objectContaining({ dryRun: false }),\n      expect.any(Function)\n    )\n  })\n})\n"}},"projectRoot":"/home/javier/programacion/platform/javi-ai","config":{"testRunner":"vitest","plugins":["@stryker-mutator/vitest-runner","@stryker-mutator/typescript-checker"],"mutate":["src/merger/json.ts","src/merger/markdown.ts","src/commands/uninstall.ts","src/installer/index.ts","src/installer/skills.ts","src/commands/doctor.ts","src/commands/update.ts","src/installer/manifest.ts"],"checkers":["typescript"],"tsconfigFile":"tsconfig.json","thresholds":{"high":80,"low":60,"break":50},"allowConsoleColors":true,"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"coverageAnalysis":"perTest","clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignorePatterns":[],"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199254740991,"maxTestRunnerReuse":0,"mutator":{"plugins":null,"excludedMutations":[]},"appendPlugins":[],"reporters":["clear-text","progress","html"],"htmlReporter":{"fileName":"reports/mutation/mutation.html"},"jsonReporter":{"fileName":"reports/mutation/mutation.json"},"disableTypeChecks":true,"symlinkNodeModules":true,"tempDirName":".stryker-tmp","cleanTempDir":true,"testRunnerNodeArgs":[],"timeoutFactor":1.5,"timeoutMS":5000,"dryRunTimeoutMinutes":5,"warnings":true,"disab
