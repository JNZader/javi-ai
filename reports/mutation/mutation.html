')","status":"Killed","testsCompleted":13,"killedBy":["65"],"location":{"end":{"column":35,"line":217},"start":{"column":26,"line":217}}}],"source":"import fs from 'fs-extra'\nimport path from 'path'\nimport { execFile } from 'child_process'\nimport { promisify } from 'util'\nimport { fileURLToPath } from 'url'\nimport { CLI_OPTIONS, MANIFEST_PATH, BACKUP_DIR } from '../constants.js'\nimport { readManifest } from '../installer/manifest.js'\nimport type { CLI } from '../types/index.js'\n\nconst execFileAsync = promisify(execFile)\n\nconst __dirname = path.dirname(fileURLToPath(import.meta.url))\nconst ASSETS_ROOT = path.resolve(__dirname, '../../')\n\nexport type CheckStatus = 'ok' | 'fail' | 'skip'\n\nexport interface DoctorCheck {\n  label: string\n  status: CheckStatus\n  detail?: string\n}\n\nexport interface DoctorSection {\n  title: string\n  checks: DoctorCheck[]\n}\n\nexport interface DoctorResult {\n  sections: DoctorSection[]\n}\n\n/** Resolve a binary name to its full path, returns null if not found */\nasync function which(bin: string): Promise<"+"string | null> {\n  try {\n    const { stdout } = await execFileAsync('which', [bin])\n    return stdout.trim() || null\n  } catch {\n    return null\n  }\n}\n\n/** Count skill dirs at a given path (only direct subdirectories with a SKILL.md) */\nasync function countInstalledSkills(skillsPath: string): Promise<"+"number> {\n  if (!await fs.pathExists(skillsPath)) return 0\n  const entries = await fs.readdir(skillsPath)\n  let count = 0\n  for (const entry of entries) {\n    const skillMd = path.join(skillsPath, entry, 'SKILL.md')\n    if (await fs.pathExists(skillMd)) count++\n  }\n  return count\n}\n\n/** Count skills that javi-ai would install (upstream + own, deduped) */\nasync function countExpectedSkills(): Promise<"+"number> {\n  const upstreamSrc = path.join(ASSETS_ROOT, 'upstream', 'skills')\n  const ownSrc = path.join(ASSETS_ROOT, 'own', 'skills')\n  const names = new Set<"+"string>()\n\n  if (await fs.pathExists(upstreamSrc)) {\n    const dirs = await fs.readdir(upstreamSrc)\n    for (const d of dirs) {\n      if (d.startsWith('.') || d === '_shared') continue\n      if (await fs.pathExists(path.join(upstreamSrc, d, 'SKILL.md'))) {\n        names.add(d)\n      }\n    }\n  }\n\n  if (await fs.pathExists(ownSrc)) {\n    const dirs = await fs.readdir(ownSrc)\n    for (const d of dirs) {\n      if (!d.startsWith('.')) names.add(d)\n    }\n  }\n\n  return names.size\n}\n\n/** Config files that javi-ai manages per CLI */\nconst CONFIG_FILES: Array<"+"{ cli: CLI; label: string; filePath: string }> = [\n  { cli: 'claude',    label: '~/.claude/CLAUDE.md',                    filePath: path.join(process.env['HOME'] ?? '~', '.claude', 'CLAUDE.md') },\n  { cli: 'opencode',  label: '~/.config/opencode/opencode.json',        filePath: path.join(process.env['HOME'] ?? '~', '.config', 'opencode', 'opencode.json') },\n  { cli: 'gemini',    label: '~/.gemini/GEMINI.md',                     filePath: path.join(process.env['HOME'] ?? '~', '.gemini', 'GEMINI.md') },\n  { cli: 'qwen',      label: '~/.qwen/QWEN.md',                         filePath: path.join(process.env['HOME'] ?? '~', '.qwen', 'QWEN.md') },\n  { cli: 'codex',     label: '~/.codex/AGENTS.md',                      filePath: path.join(process.env['HOME'] ?? '~', '.codex', 'AGENTS.md') },\n  { cli: 'copilot',   label: '~/.copilot/COPILOT.md',                   filePath: path.join(process.env['HOME'] ?? '~', '.copilot', 'COPILOT.md') },\n]\n\nexport async function runDoctor(): Promise<"+"DoctorResult> {\n  const manifest = await readManifest()\n  const installedClis = new Set<"+"CLI>(manifest.clis)\n  const expectedSkills = await countExpectedSkills()\n  const sections: DoctorSection[] = []\n\n  // ── 1. Installation ────────────────────────────────────────────────────────\n  const installChecks: DoctorCheck[] = []\n\n  if (installedClis.size > 0) {\n    installChecks.push({\n      label: `Installed on ${manifest.installedAt.split('T')[0]}  (last updated: ${manifest.updatedAt.split('T')[0]})`,\n      status: 'ok',\n    })\n    installChecks.push({\n      label: `CLIs configured: ${[...installedClis].join(', ')}`,\n      status: 'ok',\n    })\n  } else {\n    installChecks.push({\n      label: 'No installation found',\n      status: 'fail',\n      detail: 'Run javi-ai to install',\n    })\n  }\n\n  sections.push({ title: 'Installation', checks: installChecks })\n\n  // ── 2. CLI Detection ───────────────────────────────────────────────────────\n  const cliChecks: DoctorCheck[] = []\n  for (const opt of CLI_OPTIONS) {\n    const bin = await which(opt.id)\n    if (!installedClis.has(opt.id)) {\n      cliChecks.push({ label: opt.id.padEnd(12), status: 'skip', detail: 'not installed via javi-ai' })\n    } else if (bin) {\n      cliChecks.push({ label: opt.id.padEnd(12), status: 'ok', detail: `found at ${bin}` })\n    } else {\n      cliChecks.push({ label: opt.id.padEnd(12), status: 'fail', detail: 'not found in PATH' })\n    }\n  }\n  sections.push({ title: 'CLI Detection', checks: cliChecks })\n\n  // ── 3. Skills ──────────────────────────────────────────────────────────────\n  const skillChecks: DoctorCheck[] = []\n  for (const cli of installedClis) {\n    const opt = CLI_OPTIONS.find(c => c.id === cli)\n    if (!opt) continue\n    const present = await countInstalledSkills(opt.skillsPath)\n    const ok = present >= expectedSkills\n    skillChecks.push({\n      label: cli.padEnd(12),\n      status: ok ? 'ok' : 'fail',\n      detail: `${present}/${expectedSkills} skills present`,\n    })\n  }\n  if (skillChecks.length === 0) {\n    skillChecks.push({ label: 'No CLIs installed', status: 'skip' })\n  }\n  sections.push({ title: 'Skills', checks: skillChecks })\n\n  // ── 4. Config Files ────────────────────────────────────────────────────────\n  const configChecks: DoctorCheck[] = []\n  for (const { cli, label, filePath } of CONFIG_FILES) {\n    if (!installedClis.has(cli)) {\n      configChecks.push({ label, status: 'skip', detail: 'not installed' })\n    } else {\n      const exists = await fs.pathExists(filePath)\n      configChecks.push({ label, status: exists ? 'ok' : 'fail', detail: exists ? 'present' : 'missing' })\n    }\n  }\n  sections.push({ title: 'Config Files', checks: configChecks })\n\n  // ── 5. Hooks ───────────────────────────────────────────────────────────────\n  const hookChecks: DoctorCheck[] = []\n  const hooksDir = path.join(process.env['HOME'] ?? '~', '.claude', 'hooks')\n  const hooksSrc = path.join(ASSETS_ROOT, 'own', 'hooks', 'claude')\n\n  if (installedClis.has('claude') && await fs.pathExists(hooksSrc)) {\n    const hookFiles = await fs.readdir(hooksSrc)\n    for (const hookFile of hookFiles) {\n      const hookPath = path.join(hooksDir, hookFile)\n      if (!await fs.pathExists(hookPath)) {\n        hookChecks.push({ label: hookFile, status: 'fail', detail: 'not found' })\n      } else {\n        try {\n          await fs.access(hookPath, fs.constants.X_OK)\n          hookChecks.push({ label: hookFile, status: 'ok', detail: 'executable' })\n        } catch {\n          hookChecks.push({ label: hookFile, status: 'fail', detail: 'not executable' })\n        }\n      }\n    }\n  }\n  if (hookChecks.length === 0) {\n    hookChecks.push({ label: 'No hooks installed', status: 'skip' })\n  }\n  sections.push({ title: 'Hooks', checks: hookChecks })\n\n  // ── 6. Backups ─────────────────────────────────────────────────────────────\n  const backupChecks: DoctorCheck[] = []\n  if (await fs.pathExists(BACKUP_DIR)) {\n    const backupDirs = (await fs.readdir(BACKUP_DIR)).sort().reverse()\n    if (backupDirs.length === 0) {\n      backupChecks.push({ label: 'No backups found', status: 'skip' })\n    } else {\n      for (const backup of backupDirs.slice(0, 5)) {\n        const backupPath = path.join(BACKUP_DIR, backup)\n        const files = await fs.readdir(backupPath, { recursive: true })\n        const fileCount = (await Promise.all(\n          files.map(async f => {\n            const stat = await fs.stat(path.join(backupPath, String(f)))\n            return stat.isFile() ? 1 : 0\n          })\n        )).reduce((a: number, b: number) => a + b, 0)\n        backupChecks.push({\n          label: backup.replace(/T(\\d{2})-(\\d{2})-(\\d{2})/, 'T$1:$2:$3').slice(0, 19),\n          status: 'ok',\n          detail: `${fileCount} files`,\n        })\n      }\n      if (backupDirs.length > 5) {\n        backupChecks.push({ label: `... and ${backupDirs.length - 5} more`, status: 'skip' })\n      }\n    }\n  } else {\n    backupChecks.push({ label: 'No backup directory', status: 'skip' })\n  }\n  sections.push({ title: 'Backups', checks: backupChecks })\n\n  return { sections }\n}\n"},"src/commands/uninstall.ts":{"language":"typescript","mutants":[{"id":"277","mutatorName":"BlockStatement","replacement":"{}","statusReason":"src/commands/uninstall.ts(25,45): error TS2355: A function whose declared type is neither 'undefined', 'void', nor 'any' must return a value.\n","status":"CompileError","location":{"end":{"column":2,"line":87},"start":{"column":94,"line":25}}},{"id":"284","mutatorName":"BooleanLiteral","replacement":"opt","statusReason":"src/commands/uninstall.ts(35,29): error TS18048: 'opt' is possibly 'undefined'.\nsrc/commands/uninstall.ts(37,19): error TS18048: 'opt' is possibly 'undefined'.\nsrc/commands/uninstall.ts(38,15): error TS18048: 'opt' is possibly 'undefined'.\nsrc/commands/uninstall.ts(49,32): error TS18048: 'opt' is possibly 'undefined'.\nsrc/commands/uninstall.ts(65,34): error TS18048: 'opt' is possibly 'undefined'.\n","status":"CompileError","location":{"end":{"column":13,"line":32},"start":{"column":9,"line":32}}},{"id":"278","mutatorName":"ArrayDeclaration","replacement":"[\"Stryker was here\"]","statusReason":"src/commands/uninstall.ts(28,35): error TS2322: Type 'string' is not assignable to type 'UninstallItem'.\n","status":"CompileError","location":{"end":{"column":36,"li "statusReason":"expected false to be true // Object.is equality","status":"Killed","testsCompleted":16,"killedBy":["6"],"location":{"end":{"column":55,"line":138},"start":{"column":51,"line":138}}},{"id":"628","mutatorName":"ObjectLiteral","replacement":"{}","status":"Survived","testsCompleted":62,"location":{"end":{"column":57,"line":138},"start":{"column":38,"line":138}}}],"source":"import path from 'path'\nimport fs from 'fs-extra'\nimport { fileURLToPath } from 'url'\nimport type { InstallOptions, InstallStep, CLI } from '../types/index.js'\nimport { CLI_OPTIONS, BACKUP_DIR } from '../constants.js'\nimport { installSkillsForCLI } from './skills.js'\nimport { mergeMarkdownFile } from '../merger/markdown.js'\nimport { mergeJsonFile } from '../merger/json.js'\nimport { readManifest, writeManifest } from './manifest.js'\n\nconst __dirname = path.dirname(fileURLToPath(import.meta.url))\nconst ASSETS_ROOT = path.resolve(__dirname, '../../')\n\nexport async function runInstall(\n  options: InstallOptions,\n  onStep: (step: InstallStep) => void\n): Promise<"+"void> {\n  const timestamp = new Date().toISOString().replace(/[:.]/g, '-')\n  const backupDir = path.join(BACKUP_DIR, timestamp)\n\n  for (const cli of options.clis) {\n    const cliOption = CLI_OPTIONS.find(c => c.id === cli)\n    if (!cliOption) continue\n\n    // Skills\n    if (options.features.includes('skills')) {\n      onStep({ id: `${cli}-skills`, label: `Installing skills for ${cliOption.label}`, status: 'running' })\n      try {\n        const installed = await installSkillsForCLI(cli, options.dryRun)\n        onStep({ id: `${cli}-skills`, label: `Skills for ${cliOption.label}`, status: 'done', detail: `${installed.length} skills` })\n      } catch (e) {\n        onStep({ id: `${cli}-skills`, label: `Skills for ${cliOption.label}`, status: 'error', detail: String(e) })\n      }\n    }\n\n    // Configs\n    if (options.features.includes('configs')) {\n      onStep({ id: `${cli}-configs`, label: `Installing config for ${cliOption.label}`, status: 'running' })\n      try {\n        await installConfig(cli, cliOption.configPath, backupDir, options.dryRun)\n        onStep({ id: `${cli}-configs`, label: `Config for ${cliOption.label}`, status: 'done' })\n      } catch (e) {\n        onStep({ id: `${cli}-configs`, label: `Config for ${cliOption.label}`, status: 'error', detail: String(e) })\n      }\n    }\n\n    // Hooks (claude only for now)\n    if (options.features.includes('hooks') && cli === 'claude') {\n      onStep({ id: `${cli}-hooks`, label: 'Installing hooks for Claude Code', status: 'running' })\n      try {\n        await installHooks(cliOption.configPath, options.dryRun)\n        onStep({ id: `${cli}-hooks`, label: 'Hooks for Claude Code', status: 'done' })\n      } catch (e) {\n        onStep({ id: `${cli}-hooks`, label: 'Hooks for Claude Code', status: 'error', detail: String(e) })\n      }\n    }\n\n    // Orchestrators\n    if (options.features.includes('orchestrators')) {\n      onStep({ id: `${cli}-orch`, label: `Installing orchestrators for ${cliOption.label}`, status: 'running' })\n      try {\n        await installOrchestrators(cli, cliOption.configPath, options.dryRun)\n        onStep({ id: `${cli}-orch`, label: `Orchestrators for ${cliOption.label}`, status: 'done' })\n      } catch (e) {\n        onStep({ id: `${cli}-orch`, label: `Orchestrators for ${cliOption.label}`, status: 'error', detail: String(e) })\n      }\n    }\n  }\n\n  // Update manifest\n  if (!options.dryRun) {\n    const manifest = await readManifest()\n    manifest.updatedAt = new Date().toISOString()\n    manifest.clis = [...new Set([...manifest.clis, ...options.clis])]\n    await writeManifest(manifest)\n  }\n}\n\nasync function installConfig(cli: CLI, configPath: string, backupDir: string, dryRun: boolean): Promise<"+"void> {\n  const configSrc = path.join(ASSETS_ROOT, 'configs', cli)\n  if (!await fs.pathExists(configSrc)) return\n\n  if (!dryRun) {\n    await fs.ensureDir(configPath)\n    await fs.ensureDir(backupDir)\n  }\n\n  const files = await fs.readdir(configSrc, { recursive: true }) as string[]\n  for (const file of files) {\n    const src = path.join(configSrc, file)\n    const stat = await fs.stat(src)\n    if (stat.isDirectory()) continue\n\n    const dest = path.join(configPath, file)\n    const backup = path.join(backupDir, cli, file)\n\n    if (dryRun) continue\n\n    await fs.ensureDir(path.dirname(dest))\n\n    if (file.endsWith('.json')) {\n      await mergeJsonFile(dest, src, await fs.pathExists(dest) ? backup : undefined)\n    } else if (file.endsWith('.md') && file !== 'README.md') {\n      await mergeMarkdownFile(dest, src, await fs.pathExists(dest) ? backup : undefined)\n    } else {\n      // create-if-absent for other files\n      if (!await fs.pathExists(dest)) {\n        await fs.copy(src, dest)\n      }\n    }\n  }\n}\n\nasync function installHooks(configPath: string, dryRun: boolean): Promise<"+"void> {\n  const hooksSrc = path.join(ASSETS_ROOT, 'own', 'hooks', 'claude')\n  const hooksDest = path.join(configPath, 'hooks')\n  if (!await fs.pathExists(hooksSrc)) return\n  if (dryRun) return\n  await fs.ensureDir(hooksDest)\n  const files = await fs.readdir(hooksSrc)\n  for (const file of files) {\n    const dest = path.join(hooksDest, file)\n    if (!await fs.pathExists(dest)) {\n      await fs.copy(path.join(hooksSrc, file), dest)\n      await fs.chmod(dest, 0o755)\n    }\n  }\n}\n\nasync function installOrchestrators(cli: CLI, configPath: string, dryRun: boolean): Promise<"+"void> {\n  const orchSrc = path.join(ASSETS_ROOT, 'delta', 'orchestrators', cli)\n  if (!await fs.pathExists(orchSrc)) return\n  if (dryRun) return\n  const agentsDest = cli === 'opencode'\n    ? path.join(configPath, 'agents')\n    : path.join(configPath, 'agents', cli)\n  await fs.ensureDir(agentsDest)\n  await fs.copy(orchSrc, agentsDest, { overwrite: true })\n}\n"},"src/merger/json.ts":{"language":"typescript","mutants":[{"id":"715 LToPath } from 'url'\nimport type { CLI } from '../types/index.js'\nimport { CLI_OPTIONS } from '../constants.js'\n\nconst __dirname = path.dirname(fileURLToPath(import.meta.url))\nconst ASSETS_ROOT = path.resolve(__dirname, '../../')\n\n// Priority order: psf (lowest) → upstream → own → delta-extensions (highest)\n// Skills in upstream/ with EXTENSION.md get the extension appended\nasync function installSkillsForCLI(cli: CLI, dryRun: boolean): Promise<"+"string[]> {\n  const cliOption = CLI_OPTIONS.find(c => c.id === cli)\n  if (!cliOption) return []\n\n  const installed: string[] = []\n  const skillsSource = path.join(ASSETS_ROOT, 'upstream', 'skills')\n  const ownSkillsSource = path.join(ASSETS_ROOT, 'own', 'skills')\n  const dest = cliOption.skillsPath\n\n  if (!dryRun) {\n    await fs.ensureDir(dest)\n  }\n\n  // Install upstream skills (+ append EXTENSION.md if exists)\n  const skillDirs = await fs.readdir(skillsSource)\n  for (const skillDir of skillDirs) {\n    if (skillDir.startsWith('.') || skillDir === '_shared') continue\n    const skillPath = path.join(skillsSource, skillDir)\n    const stat = await fs.stat(skillPath)\n    if (!stat.isDirectory()) continue\n\n    const skillMd = path.join(skillPath, 'SKILL.md')\n    const extensionMd = path.join(skillPath, 'EXTENSION.md')\n\n    if (!await fs.pathExists(skillMd)) continue\n\n    const destDir = path.join(dest, skillDir)\n    if (!dryRun) {\n      await fs.ensureDir(destDir)\n      let content = await fs.readFile(skillMd, 'utf-8')\n      // Append extension if exists\n      if (await fs.pathExists(extensionMd)) {\n        const ext = await fs.readFile(extensionMd, 'utf-8')\n        content = `${content}\\n\\n---\\n\\n${ext}`\n      }\n      await fs.writeFile(path.join(destDir, 'SKILL.md'), content, 'utf-8')\n    }\n    installed.push(skillDir)\n  }\n\n  // Install _shared conventions\n  const sharedSrc = path.join(skillsSource, '_shared')\n  if (await fs.pathExists(sharedSrc)) {\n    const sharedDest = path.join(dest, '_shared')\n    if (!dryRun) {\n      await fs.ensureDir(sharedDest)\n      await fs.copy(sharedSrc, sharedDest, { overwrite: true })\n    }\n    installed.push('_shared')\n  }\n\n  // Install own skills\n  if (await fs.pathExists(ownSkillsSource)) {\n    const ownDirs = await fs.readdir(ownSkillsSource)\n    for (const skillDir of ownDirs) {\n      if (skillDir.startsWith('.')) continue\n      const skillPath = path.join(ownSkillsSource, skillDir)\n      const destDir = path.join(dest, skillDir)\n      if (!dryRun) {\n        await fs.copy(skillPath, destDir, { overwrite: true })\n      }\n      installed.push(skillDir)\n    }\n  }\n\n  return installed\n}\n\nexport { installSkillsForCLI }\n"},"src/merger/markdown.ts":{"language":"typescript","mutants":[{"id":"772","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"src/merger/markdown.ts(9,55): error TS2769: No overload matches this call.\n  The last overload gave the following error.\n    Argument of type 'string' is not assignable to parameter of type '(err: ErrnoException | null, data: NonSharedBuffer) => void'.\n","status":"CompileError","location":{"end":{"column":62,"line":9},"start":{"column":55,"line":9}}},{"id":"777","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"src/merger/markdown.ts(14,33): error TS2345: Argument of type 'string | undefined' is not assignable to parameter of type 'string'.\n  Type 'undefined' is not assignable to type 'string'.\n","status":"CompileError","location":{"end":{"column":19,"line":13},"start":{"column":9,"line":13}}},{"id":"774","mutatorName":"ConditionalExpression","replacement":"true","statusReason":"expected \"vi.fn()\" to be called at least once","status":"Killed","testsCompleted":3,"killedBy":["2"],"location":{"end":{"column":38,"line":12},"start":{"column":7,"line":12}}},{"id":"775","mutatorName":"ConditionalExpression","replacement":"false","statusReason":"src/merger/markdown.ts(14,33): error TS2345: Argument  running step has non-empty label"},{"id":"45","name":"runInstall — step labels (surviving mutant: label template strings) hooks error step has non-empty label and detail"},{"id":"46","name":"runInstall — step labels (surviving mutant: label template strings) configs running step label contains CLI label"},{"id":"47","name":"runInstall — step labels (surviving mutant: label template strings) configs done step has non-empty label"},{"id":"48","name":"runInstall — step labels (surviving mutant: label template strings) configs error step has non-empty label"},{"id":"49","name":"runInstall — step labels (surviving mutant: label template strings) orchestrators done step has non-empty label"},{"id":"50","name":"runInstall — step labels (surviving mutant: label template strings) timestamp has dashes not original colons (replace /[:.]/g with -)"},{"id":"51","name":"runInstall — step labels (surviving mutant: label template strings) installConfig: non-dryRun creates configPath and backupDir"},{"id":"52","name":"runInstall — step labels (surviving mutant: label template strings) orchestrators: copy uses overwrite:true (file gets updated on reinstall)"}],"source":"/**\n * index.test.ts — Unit tests for runInstall (installer/index.ts)\n *\n * All FS operations and sub-functions are mocked.\n * ASSETS_ROOT is redirected to a fixed tmp path via mocking 'url'.\n * CLI_OPTIONS is mocked with a controlled set of CLIs.\n */\nimport { describe, it, expect, vi, beforeEach, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\nimport crypto from 'crypto'\n\n// ── Hoist FIXED_ASSETS_ROOT before any mock factory runs ────────────────────\nconst { FIXED_ASSETS_ROOT } = vi.hoisted(() => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const p = require('path')\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const o = require('os')\n  return {\n    FIXED_ASSETS_ROOT: p.join(o.tmpdir(), 'javi-ai-installer-index-assets-test') as string,\n  }\n})\n\n// Per-test mutable tmpDir\nlet currentTmpDir = path.join(os.tmpdir(), 'javi-ai-installer-INITIAL')\n\nfunction getPaths() {\n  const t = currentTmpDir\n  return {\n    tmpDir: t,\n    MANIFEST_PATH: path.join(t, 'manifest.json'),\n    BACKUP_DIR: path.join(t, 'backups'),\n    CLAUDE_CONFIG: path.join(t, 'claude-config'),\n    CLAUDE_SKILLS: path.join(t, 'claude-skills'),\n    OPENCODE_CONFIG: path.join(t, 'opencode-config'),\n    OPENCODE_SKILLS: path.join(t, 'opencode-skills'),\n    GEMINI_CONFIG: path.join(t, 'gemini-config'),\n    GEMINI_SKILLS: path.join(t, 'gemini-skills'),\n  }\n}\n\n// ── Mock constants ────────────────────────────────────────────────────────────\nvi.mock('../constants.js', () => ({\n  get MANIFEST_PATH() { return getPaths().MANIFEST_PATH },\n  get BACKUP_DIR() { return getPaths().BACKUP_DIR },\n  MARKER_START: '<"+"!-- BEGIN JAVI-AI -->',\n  MARKER_END: '<"+"!-- END JAVI-AI -->',\n  get HOME() {\n    // eslint-disable-next-line @typescript-eslint/no-var-requires\n    return require('os').homedir()\n  },\n  get CLI_OPTIONS() {\n    const p = getPaths()\n    return [\n      {\n        id: 'claude',\n        label: 'Claude Code',\n        configPath: p.CLAUDE_CONFIG,\n        skillsPath: p.CLAUDE_SKILLS,\n        available: true,\n      },\n      {\n        id: 'opencode',\n        label: 'OpenCode',\n        configPath: p.OPENCODE_CONFIG,\n        skillsPath: p.OPENCODE_SKILLS,\n        available: true,\n      },\n      {\n        id: 'gemini',\n        label: 'Gemini CLI',\n        configPath: p.GEMINI_CONFIG,\n        skillsPath: p.GEMINI_SKILLS,\n        available: true,\n      },\n    ]\n  },\n}))\n\n// ── Mock sub-modules ──────────────────────────────────────────────────────────\nvi.mock('./skills.js', () => ({\n  installSkillsForCLI: vi.fn().mockResolvedValue([]),\n}))\n\nvi.mock('../merger/markdown.js', () => ({\n  mergeMarkdownFile: vi.fn().mockResolvedValue(undefined),\n}))\n\nvi.mock('../merger/json.js', () => ({\n  mergeJsonFile: vi.fn().mockResolvedValue(undefined),\n}))\n\nvi.mock('./manifest.js', () => ({\n  readManifest: vi.fn().mockResolvedValue({\n    version: '0.1.0',\n    installedAt: new Date().toISOString(),\n    updatedAt: new Date().toISOString(),\n    clis: [],\n    skills: {},\n  }),\n  writeManifest: vi.fn().mockResolvedValue(undefined),\n}))\n\n// ── Mock 'url' so ASSETS_ROOT resolves to FIXED_ASSETS_ROOT ─────────────────\nvi.mock('url', async (importOriginal) => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodePath = require('path') as typeof import('path')\n  const actual = await importOriginal<"+"typeof import('url')>()\n  return {\n    ...actual,\n    fileURLToPath: (url: string | URL) => {\n      const urlStr = url.toString()\n      if (urlStr.includes('installer/index') && !urlStr.includes('index.test')) {\n        return nodePath.join(FIXED_ASSETS_ROOT, 'src', 'installer', 'index.js')\n      }\n      return actual.fileURLToPath(url)\n    },\n  }\n})\n\nimport { runInstall } from './index.js'\nimport { installSkillsForCLI } from './skills.js'\nimport { mergeMarkdownFile } from '../merger/markdown.js'\nimport { mergeJsonFile } from '../merger/json.js'\nimport { readManifest, writeManifest } from './manifest.js'\nimport type { InstallOptions, InstallStep } from '../types/index.js'\n\nconst mockInstallSkills = vi.mocked(installSkillsForCLI)\nconst mockMergeMarkdown = vi.mocked(mergeMarkdownFile)\nconst mockMergeJson = vi.mocked(mergeJsonFile)\nconst mockReadManifest = vi.mocked(readManifest)\nconst mockWriteManifest = vi.mocked(writeManifest)\n\nfunction collectSteps(): { steps: InstallStep[]; onStep: (s: InstallStep) => void } {\n  const steps: InstallStep[] = []\n  return { steps, onStep: (s) => steps.push({ ...s }) }\n}\n\nfunction makeOptions(overrides: Partial<"+"InstallOptions> = {}): InstallOptions {\n  return {\n    clis: ['claude'],\n    features: ['skills', 'configs', 'hooks', 'orchestrators'],\n    dryRun: false,\n    backup: true,\n    ...overrides,\n  }\n}\n\ndescribe('runInstall — feature routing', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-idx-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n    // reset default mocks\n    mockInstallSkills.mockResolvedValue([])\n    mockMergeMarkdown.mockResolvedValue(undefined)\n    mockMergeJson.mockResolvedValue(undefined)\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  it('installs skills when \"skills\" is in features', async () => {\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills'] }), onStep)\n    expect(mockInstallSkills).toHaveBeenCalledWith('claude', false)\n  })\n\n  it('does NOT install skills when \"skills\" is NOT in features', async () => {\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n    expect(mockInstallSkills).not.toHaveBeenCalled()\n  })\n\n  it('installs configs when \"configs\" is in features', async () => {\n    const p = getPaths()\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n    await fs.writeFile(path.join(configSrc, 'test.json'), '{}', 'utf-8')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n    await fs.writeFile(path.join(p.CLAUDE_CONFIG, 'test.json'), '{}', 'utf-8')\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n    expect(mockMergeJson).toHaveBeenCalled()\n  })\n\n  it('does NOT call mergeJsonFile when \"configs\" not in features', async () => {\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills'] }), onStep)\n    expect(mockMergeJson).not.toHaveBeenCalled()\n    expect(mockMergeMarkdown).not.toHaveBeenCalled()\n  })\n\n  it('installs orchestrators when \"orchestrators\" is in features', async () => {\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.writeFile(path.join(orchSrc, 'agent.md'), '# Agent', 'utf-8')\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['orchestrators'] }), onStep)\n\n    const p = getPaths()\n    const agentsDest = path.join(p.CLAUDE_CONFIG, 'agents', 'claude')\n    expect(await fs.pathExists(agentsDest)).toBe(true)\n  })\n\n  it('does NOT install orchestrators when \"orchestrators\" not in features', async () => {\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.writeFile(path.join(orchSrc, 'agent.md'), '# Agent', 'utf-8')\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills'] }), onStep)\n\n    const p = getPaths()\n    expect(await fs.pathExists(path.join(p.CLAUDE_CONFIG, 'agents', 'claude'))).toBe(false)\n  })\n})\n\ndescribe('runInstall — hooks guard (claude only)', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-idx-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n    mockInstallSkills.mockResolvedValue([])\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  async function setupHooksSrc() {\n    const hooksSrc = path.join(FIXED_ASSETS_ROOT, 'own', 'hooks', 'claude')\n    await fs.ensureDir(hooksSrc)\n    await fs.writeFile(path.join(hooksSrc, 'my-hook.sh'), '#!/bin/sh', 'utf-8')\n    return hooksSrc\n  }\n\n  it('hooks ARE installed for claude', async () => {\n    await setupHooksSrc()\n    const p = getPaths()\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ clis: ['claude'], features: ['hooks'] }), onStep)\n\n    const hookStep = steps.find(s => s.id === 'claude-hooks')\n    expect(hookStep).toBeDefined()\n    // hook file should be created\n    expect(await fs.pathExists(path.join(p.CLAUDE_CONFIG, 'hooks', 'my-hook.sh'))).toBe(true)\n  })\n\n  it('hooks are NOT installed for opencode', async () => {\n    await setupHooksSrc()\n    const p = getPaths()\n    await fs.ensureDir(p.OPENCODE_CONFIG)\n\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ clis: ['opencode'], features: ['hooks'] }), onStep)\n\n    const hookStep = steps.find(s => s.id === 'opencode-hooks')\n    expect(hookStep).toBeUndefined()\n  })\n\n  it('hooks are NOT installed for gemini', async () => {\n    await setupHooksSrc()\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ clis: ['gemini'], features: ['hooks'] }), onStep)\n\n    const hookStep = steps.find(s => s.id === 'gemini-hooks')\n    expect(hookStep).toBeUndefined()\n  })\n\n  it('when both claude and opencode, only claude-hooks step exists', async () => {\n    await setupHooksSrc()\n    const p = getPaths()\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ clis: ['claude', 'opencode'], features: ['hooks'] }), onStep)\n\n    const claudeHookStep = steps.find(s => s.id === 'claude-hooks')\n    const opencodeHookStep = steps.find(s => s.id === 'opencode-hooks')\n    expect(claudeHookStep).toBeDefined()\n    expect(opencodeHookStep).toBeUndefined()\n  })\n})\n\ndescribe('runInstall — onStep callbacks', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-idx-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  it('skills success: emits running then done with detail', async () => {\n    mockInstallSkills.mockResolvedValue(['react-19', 'typescript'])\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-skills' && s.status === 'running')\n    const doneStep = steps.find(s => s.id === 'claude-skills' && s.status === 'done')\n    expect(runningStep).toBeDefined()\n    expect(doneStep).toBeDefined()\n    expect(doneStep?.detail).toContain('2 skills')\n  })\n\n  it('skills failure: emits running then error with message', async () => {\n    mockInstallSkills.mockRejectedValue(new Error('disk full'))\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-skills' && s.status === 'running')\n    const errorStep = steps.find(s => s.id === 'claude-skills' && s.status === 'error')\n    expect(runningStep).toBeDefined()\n    expect(errorStep).toBeDefined()\n    expect(errorStep?.detail).toContain('disk full')\n  })\n\n  it('configs success: emits running then done', async () => {\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-configs' && s.status === 'running')\n    const doneStep = steps.find(s => s.id === 'claude-configs' && s.status === 'done')\n    expect(runningStep).toBeDefined()\n    expect(doneStep).toBeDefined()\n  })\n\n  it('hooks success: emits running then done', async () => {\n    const hooksSrc = path.join(FIXED_ASSETS_ROOT, 'own', 'hooks', 'claude')\n    await fs.ensureDir(hooksSrc)\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ clis: ['claude'], features: ['hooks'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-hooks' && s.status === 'running')\n    const doneStep = steps.find(s => s.id === 'claude-hooks' && s.status === 'done')\n    expect(runningStep).toBeDefined()\n    expect(doneStep).toBeDefined()\n  })\n\n  it('orchestrators success: emits running then done', async () => {\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ features: ['orchestrators'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-orch' && s.status === 'running')\n    const doneStep = steps.find(s => s.id === 'claude-orch' && s.status === 'done')\n    expect(runningStep).toBeDefined()\n    expect(doneStep).toBeDefined()\n  })\n\n  it('orchestrators failure: emits running then error', async () => {\n    // Provide an orchSrc that exists, but make fs.copy fail by using spy\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const copySpy = vi.spyOn(fs, 'copy').mockRejectedValueOnce(new Error('copy failed'))\n\n    const { onStep, steps } = collectSteps()\n    await runInstall(makeOptions({ features: ['orchestrators'] }), onStep)\n\n    copySpy.mockRestore()\n\n    const errorStep = steps.find(s => s.id === 'claude-orch' && s.status === 'error')\n    expect(errorStep).toBeDefined()\n    expect(errorStep?.detail).toContain('copy failed')\n  })\n})\n\ndescribe('runInstall — error isolation', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-idx-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: new Date().toISOString(),\n      updatedAt: new Date().toISOString(),\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  it('if skills throws, configs still runs', async () => {\n    mockInstallSkills.mockRejectedValue(new Error('skills error'))\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['skills', 'configs'] }), onStep)\n\n    const skillsError = steps.find(s => s.id === 'claude-skills' && s.status === 'error')\n    const configsRunning = steps.find(s => s.id === 'claude-configs' && s.status === 'running')\n    expect(skillsError).toBeDefined()\n    expect(configsRunning).toBeDefined()\n  })\n\n  it('if configs throws, hooks still runs (for claude)', async () => {\n    // Simulate configs error by making fs.readdir fail\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n\n    const readdirSpy = vi.spyOn(fs, 'readdir').mockRejectedValueOnce(new Error('readdir fail'))\n\n    const hooksSrc = path.join(FIXED_ASSETS_ROOT, 'own', 'hooks', 'claude')\n    await fs.ensureDir(hooksSrc)\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs', 'hooks'] }), onStep)\n\n    readdirSpy.mockRestore()\n\n    const configsError = steps.find(s => s.id === 'claude-configs' && s.status === 'error')\n    const hooksStep = steps.find(s => s.id === 'claude-hooks')\n    expect(configsError).toBeDefined()\n    expect(hooksStep).toBeDefined()\n  })\n\n  it('if all steps fail for claude, opencode still runs', async () => {\n    mockInstallSkills\n      .mockRejectedValueOnce(new Error('claude skills fail'))\n      .mockResolvedValueOnce([])\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({\n      clis: ['claude', 'opencode'],\n      features: ['skills'],\n    }), onStep)\n\n    const claudeError = steps.find(s => s.id === 'claude-skills' && s.status === 'error')\n    const opencodeRunning = steps.find(s => s.id === 'opencode-skills' && s.status === 'running')\n    expect(claudeError).toBeDefined()\n    expect(opencodeRunning).toBeDefined()\n  })\n})\n\ndescribe('runInstall — manifest update', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-idx-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n    mockInstallSkills.mockResolvedValue([])\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  it('manifest is updated (NOT dryRun)', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-01-01T00:00:00.000Z',\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ clis: ['claude'], features: ['skills'], dryRun: false }), onStep)\n\n    expect(mockWriteManifest).toHaveBeenCalled()\n    const writtenManifest = mockWriteManifest.mock.calls[0]![0]\n    expect(writtenManifest.clis).toContain('claude')\n  })\n\n  it('manifest is NOT updated in dryRun mode', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-01-01T00:00:00.000Z',\n      clis: [],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ clis: ['claude'], features: ['skills'], dryRun: true }), onStep)\n\n    expect(mockWriteManifest).not.toHaveBeenCalled()\n  })\n\n  it('manifest.clis is deduplicated when same CLI installed twice', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-01-01T00:00:00.000Z',\n      clis: ['claude'],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n\n    const { onStep } = collectSteps()\n    // Install claude again (already in manifest)\n    await runInstall(makeOptions({ clis: ['claude'], features: ['skills'], dryRun: false }), onStep)\n\n    expect(mockWriteManifest).toHaveBeenCalled()\n    const writtenManifest = mockWriteManifest.mock.calls[0]![0]\n    const claudeOccurrences = writtenManifest.clis.filter((c: string) => c === 'claude').length\n    expect(claudeOccurrences).toBe(1)\n  })\n\n  it('manifest.clis merges existing + new CLIs', async () => {\n    mockReadManifest.mockResolvedValue({\n      version: '0.1.0',\n      installedAt: '2024-01-01T00:00:00.000Z',\n      updatedAt: '2024-01-01T00:00:00.000Z',\n      clis: ['opencode'],\n      skills: {},\n    })\n    mockWriteManifest.mockResolvedValue(undefined)\n\n    const { onStep } = collectS       expect(errorStep.label).toBeTruthy()\n      expect(errorStep.detail).toContain('no space')\n    }\n  })\n\n  it('configs running step label contains CLI label', async () => {\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n\n    const runningStep = steps.find(s => s.id === 'claude-configs' && s.status === 'running')\n    expect(runningStep?.label).toBeTruthy()\n    expect(runningStep?.label).toContain('Claude Code')\n  })\n\n  it('configs done step has non-empty label', async () => {\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n\n    const doneStep = steps.find(s => s.id === 'claude-configs' && s.status === 'done')\n    expect(doneStep?.label).toBeTruthy()\n  })\n\n  it('configs error step has non-empty label', async () => {\n    const p = getPaths()\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n\n    const readdirSpy = vi.spyOn(fs, 'readdir').mockRejectedValueOnce(new Error('readdir fail'))\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'] }), onStep)\n\n    readdirSpy.mockRestore()\n\n    const errorStep = steps.find(s => s.id === 'claude-configs' && s.status === 'error')\n    expect(errorStep?.label).toBeTruthy()\n  })\n\n  it('orchestrators done step has non-empty label', async () => {\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.ensureDir(getPaths().CLAUDE_CONFIG)\n\n    const { steps, onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['orchestrators'] }), onStep)\n\n    const doneStep = steps.find(s => s.id === 'claude-orch' && s.status === 'done')\n    expect(doneStep?.label).toBeTruthy()\n    expect(doneStep?.label).toContain('Claude Code')\n  })\n\n  it('timestamp has dashes not original colons (replace /[:.]/g with -)', async () => {\n    // The backupDir path uses timestamp. If replace uses '' the timestamp has colons\n    // which are invalid in directory names on some OSes. We verify backupDir is built.\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'], dryRun: false }), onStep)\n    // If timestamp replace fails, ensureDir would fail with invalid path chars\n    // (test passes = replace works correctly)\n    expect(true).toBe(true)\n  })\n\n  it('installConfig: non-dryRun creates configPath and backupDir', async () => {\n    const p = getPaths()\n    const configSrc = path.join(FIXED_ASSETS_ROOT, 'configs', 'claude')\n    await fs.ensureDir(configSrc)\n    await fs.writeFile(path.join(configSrc, 'CLAUDE.md'), '# Config', 'utf-8')\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['configs'], dryRun: false }), onStep)\n\n    // configPath should be created\n    expect(await fs.pathExists(p.CLAUDE_CONFIG)).toBe(true)\n  })\n\n  it('orchestrators: copy uses overwrite:true (file gets updated on reinstall)', async () => {\n    const p = getPaths()\n    const orchSrc = path.join(FIXED_ASSETS_ROOT, 'delta', 'orchestrators', 'claude')\n    await fs.ensureDir(orchSrc)\n    await fs.writeFile(path.join(orchSrc, 'agent.md'), '# New Agent', 'utf-8')\n    await fs.ensureDir(p.CLAUDE_CONFIG)\n\n    // Pre-create the destination with old content\n    const agentsDest = path.join(p.CLAUDE_CONFIG, 'agents', 'claude')\n    await fs.ensureDir(agentsDest)\n    await fs.writeFile(path.join(agentsDest, 'agent.md'), '# Old Agent', 'utf-8')\n\n    const { onStep } = collectSteps()\n    await runInstall(makeOptions({ features: ['orchestrators'], dryRun: false }), onStep)\n\n    const content = await fs.readFile(path.join(agentsDest, 'agent.md'), 'utf-8')\n    // overwrite: true means new content should be there\n    expect(content).toBe('# New Agent')\n  })\n})\n"},"src/commands/doctor.test.ts":{"tests":[{"id":"53","name":"runDoctor no manifest: installation section shows installed=false"},{"id":"54","name":"runDoctor manifest with 2 CLIs: shows them listed"},{"id":"55","name":"runDoctor CLI in manifest + found in PATH: cli status = ok"},{"id":"56","name":"runDoctor CLI in manifest + NOT in PATH: cli status = fail"},{"id":"57","name":"runDoctor CLI not in manifest: cli status = skip"},{"id":"58","name":"runDoctor skill count matches expected: status ok"},{"id":"59","name":"runDoctor skill count below expected: status fail"},{"id":"60","name":"runDoctor config file present: section has ok/fail checks (not skip) for installed CLI"},{"id":"61","name":"runDoctor config file absent: status fail for installed CLI config"},{"id":"62","name":"runDoctor hook file absent: status fail (when hooks source exists)"},{"id":"63","name":"runDoctor hook file present + executable: hook check status reflects install state"},{"id":"64","name":"runDoctor hook file present + NOT executable: check status is fail"},{"id":"65","name":"runDoctor backup dirs listed (up to 5)"},{"id":"66","name":"runDoctor backup file count is correct (no double-counting) after bug fix"},{"id":"67","name":"runDoctor sections array has all expected sections"},{"id":"68","name":"runDoctor backup directory absent: shows skip check"},{"id":"69","name":"runDoctor backup dirs are sorted newest-first (reverse chronological)"},{"id":"70","name":"runDoctor skill count: installed skills WITHOUT SKILL.md are not counted"},{"id":"71","name":"runDoctor opencode config shows as skip when opencode not in manifest"},{"id":"72","name":"runDoctor hook detection: installs.has(claude) + missing hooksSrc → skip/no hook checks"},{"id":"73","name":"runDoctor empty backup directory: shows \"No backups found\" skip check"},{"id":"74","name":"runDoctor backup count >5: shows \"and N more\" with correct count"},{"id":"75","name":"runDoctor countExpectedSkills: same skill name in own/ and upstream/ is only counted once"},{"id":"76","name":"runDoctor countExpectedSkills: upstream skills without SKILL.md are excluded"},{"id":"77","name":"runDoctor countExpectedSkills: upstream dot-dirs and _shared are excluded"},{"id":"78","name":"runDoctor which returns null (empty stdout): cli status is fail"},{"id":"79","name":"runDoctor skill count: present === expected → ok (not fail)"},{"id":"80","name":"runDoctor skill count: present === expected - 1 → fail"},{"id":"81","name":"runDoctor backup: exactly 5 dirs → no \"more\" entry"},{"id":"82","name":"runDoctor backup: exactly 6 dirs → \"1 more\" entry"},{"id":"83","name":"runDoctor backup: exactly 0 dirs in backup dir → \"No backups found\" skip"},{"id":"84","name":"runDoctor sections contain correct status distribution: ok/fail/skip mix"},{"id":"85","name":"runDoctor config section: installed CLI with missing config file → fail"},{"id":"86","name":"runDoctor config section: all uninstalled CLIs show skip"},{"id":"87","name":"runDoctor config section: opencode installed → shows ok or fail (not skip)"},{"id":"88","name":"runDoctor hook check: hook file exists but is not executable → status fail"},{"id":"89","name":"runDoctor hook check: hook file exists and is executable → status ok"},{"id":"90","name":"runDoctor skills section: no CLIs installed → shows \"No CLIs installed\" skip"},{"id":"91","name":"runDoctor installation section: shows correct date from manifest"},{"id":"92","name":"runDoctor installation section: shows installed CLIs list"},{"id":"93","name":"runDoctor installation \"no install found\" detail is non-empty string"},{"id":"94","name":"runDoctor cli detection: skip detail is non-empty (not installed via javi-ai)"},{"id":"95","name":"runDoctor cli detection: when join uses separator, multiple CLIs shown comma-separated"},{"id":"96","name":"runDoctor config files: missing config detail is non-empty string"},{"id":"97","name":"runDoctor config files: present config detail is \"present\" (not empty)"},{"id":"98","name":"runDoctor hooks section: \"No hooks installed\" label is non-empty"},{"id":"99","name":"runDoctor backups: \"No backup directory\" label is non-empty"},{"id":"100","name":"runDoctor backups: more entry label uses subtraction (length - 5), not addition"},{"id":"101","name":"runDoctor backup label format: T followed by colon-separated time (not dashes)"},{"id":"102","name":"runDoctor hooks src path uses \"own\" subdir"},{"id":"103","name":"runDoctor countExpectedSkills: own skills do not require SKILL.md to be counted"},{"id":"104","name":"runDoctor skill check: opt is found by exact CLI id match"},{"id":"105","name":"runDoctor hooks loop body runs for each hook file (not skipped entirely)"},{"id":"106","name":"runDoctor hooks pathExists false → status fail with \"not found\" detail"},{"id":"107","name":"runDoctor hooks access catch → detail says \"not executable\""},{"id":"108","name":"runDoctor hooks access success → detail says \"executable\""},{"id":"109","name":"runDoctor hooks check: hookChecks.length === 0 after hook loop shows skip"}],"source":"/**\n * doctor.test.ts — Integration tests for runDoctor\n *\n * Strategy for ASSETS_ROOT: doctor.ts computes ASSETS_ROOT = path.resolve(__dirname, '../../')\n * We redirect it using a FIXED path stored in process.env.\n * Constants and paths use getters so they're re-evaluated per test,\n * but ASSETS_ROOT is fixed for the whole file (module load time).\n * We use a fixed base dir and rebuild content in beforeEach.\n */\nimport { describe, it, expect, vi, beforeEach, afterEach } from 'vitest'\nimport fs from 'fs-extra'\nimport path from 'path'\nimport os from 'os'\nimport crypto from 'crypto'\n\n// vi.hoisted() runs before vi.mock() factories — use require() to access built-ins\nconst { FIXED_ASSETS_ROOT } = vi.hoisted(() => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const p = require('path')\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const o = require('os')\n  return {\n    FIXED_ASSETS_ROOT: p.join(o.tmpdir(), 'javi-ai-doctor-assets-test') as string,\n  }\n})\n\n// Per-test mutable state: tmpDir changes each test\nlet currentTmpDir = path.join(os.tmpdir(), 'javi-ai-doctor-INITIAL')\n\nfunction getDoctorPaths() {\n  const t = currentTmpDir\n  return {\n    tmpDir: t,\n    MANIFEST_PATH: path.join(t, 'manifest.json'),\n    BACKUP_DIR: path.join(t, 'backups'),\n    CLAUDE_CONFIG: path.join(t, 'claude-config'),\n    CLAUDE_SKILLS: path.join(t, 'claude-skills'),\n    OPENCODE_CONFIG: path.join(t, 'opencode-config'),\n    OPENCODE_SKILLS: path.join(t, 'opencode-skills'),\n  }\n}\n\nvi.mock('../constants.js', () => ({\n  get MANIFEST_PATH() { return getDoctorPaths().MANIFEST_PATH },\n  get BACKUP_DIR() { return getDoctorPaths().BACKUP_DIR },\n  MARKER_START: '<"+"!-- BEGIN JAVI-AI -->',\n  MARKER_END: '<"+"!-- END JAVI-AI -->',\n  get HOME() { return require('os').homedir() },\n  get CLI_OPTIONS() {\n    const p = getDoctorPaths()\n    return [\n      {\n        id: 'claude',\n        label: 'Claude Code',\n        configPath: p.CLAUDE_CONFIG,\n        skillsPath: p.CLAUDE_SKILLS,\n        available: true,\n      },\n      {\n        id: 'opencode',\n        label: 'OpenCode',\n        configPath: p.OPENCODE_CONFIG,\n        skillsPath: p.OPENCODE_SKILLS,\n        available: true,\n      },\n    ]\n  },\n}))\n\nvi.mock('../installer/manifest.js', () => ({\n  readManifest: vi.fn(),\n  writeManifest: vi.fn(),\n}))\n\nvi.mock('child_process', () => ({\n  execFile: vi.fn(),\n}))\n\nvi.mock('url', async (importOriginal) => {\n  // eslint-disable-next-line @typescript-eslint/no-var-requires\n  const nodePath = require('path') as typeof import('path')\n  const actual = await importOriginal<"+"typeof import('url')>()\n  return {\n    ...actual,\n    fileURLToPath: (url: string | URL) => {\n      const urlStr = url.toString()\n      if (urlStr.includes('doctor') && !urlStr.includes('doctor.test')) {\n        // doctor.ts: ASSETS_ROOT = path.resolve(__dirname, '../../')\n        // return FIXED_ASSETS_ROOT/src/commands/doctor.js\n        // __dirname = FIXED_ASSETS_ROOT/src/commands\n        // path.resolve(FIXED_ASSETS_ROOT/src/commands, '../../') = FIXED_ASSETS_ROOT ✓\n        return nodePath.join(FIXED_ASSETS_ROOT, 'src', 'commands', 'doctor.js')\n      }\n      return actual.fileURLToPath(url)\n    },\n  }\n})\n\nimport { runDoctor } from './doctor.js'\nimport { readManifest } from '../installer/manifest.js'\nimport { execFile } from 'child_process'\n\nconst mockReadManifest = vi.mocked(readManifest)\nconst mockExecFile = vi.mocked(execFile)\n\nfunction makeManifest(clis: string[] = []) {\n  return {\n    version: '0.1.0',\n    installedAt: '2024-01-15T10:00:00.000Z',\n    updatedAt: '2024-06-01T08:30:00.000Z',\n    // eslint-disable-next-line @typescript-eslint/no-explicit-any\n    clis: clis as any,\n    skills: {},\n  }\n}\n\nfunction mockWhich(binResults: Record<"+"string, string | null>) {\n  // eslint-disable-next-line @typescript-eslint/no-explicit-any\n  mockExecFile.mockImplementation((_bin: string, args: any, callback: any) => {\n    const bin = args[0] as string\n    const result = binResults[bin]\n    if (result !== undefined && result !== null) {\n      callback(null, { stdout: result + '\\n', stderr: '' })\n    } else {\n      callback(new Error('not found'), { stdout: '', stderr: '' })\n    }\n    return {} as ReturnType<"+"typeof execFile>\n  })\n}\n\ndescribe('runDoctor', () => {\n  beforeEach(async () => {\n    currentTmpDir = path.join(os.tmpdir(), `javi-ai-doctor-${crypto.randomUUID()}`)\n    await fs.ensureDir(currentTmpDir)\n    // Clear FIXED_ASSETS_ROOT for each test\n    await fs.remove(FIXED_ASSETS_ROOT)\n    mockWhich({})\n  })\n\n  afterEach(async () => {\n    await fs.remove(currentTmpDir)\n    await fs.remove(FIXED_ASSETS_ROOT)\n    vi.clearAllMocks()\n  })\n\n  it('no manifest: installation section shows installed=false', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest([]))\n\n    const result = await runDoctor()\n\n    const installSection = result.sections.find(s => s.title === 'Installation')!\n    expect(installSection).toBeDefined()\n    const failCheck = installSection.checks.find(c => c.status === 'fail')\n    expect(failCheck).toBeDefined()\n    expect(failCheck?.label).toContain('No installation found')\n  })\n\n  it('manifest with 2 CLIs: shows them listed', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude', 'opencode']))\n\n    const result = await runDoctor()\n\n    const installSection = result.sections.find(s => s.title === 'Installation')!\n    const cliCheck = installSection.checks.find(c => c.label.includes('CLIs configured'))\n    expect(cliCheck).toBeDefined()\n    expect(cliCheck?.label).toContain('claude')\n    expect(cliCheck?.label).toContain('opencode')\n  })\n\n  it('CLI in manifest + found in PATH: cli status = ok', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    mockWhich({ claude: '/usr/bin/claude' })\n\n    const result = await runDoctor()\n\n    const cliSection = result.sections.find(s => s.title === 'CLI Detection')!\n    const claudeCheck = cliSection.checks.find(c => c.label.trim() === 'claude')!\n    expect(claudeCheck.status).toBe('ok')\n    expect(claudeCheck.detail).toContain('/usr/bin/claude')\n  })\n\n  it('CLI in manifest + NOT in PATH: cli status = fail', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n    mockWhich({ claude: null })\n\n    const result = await runDoctor()\n\n    const cliSection = result.sections.find(s => s.title === 'CLI Detection')!\n    const claudeCheck = cliSection.checks.find(c => c.label.trim() === 'claude')!\n    expect(claudeCheck.status).toBe('fail')\n    expect(claudeCheck.detail).toContain('not found in PATH')\n  })\n\n  it('CLI not in manifest: cli status = skip', async () => {\n    mockReadManifest.mockResolv heck.status).toBe('fail')\n    expect(claudeSkillCheck.detail).toContain('1/2')\n  })\n\n  it('config file present: section has ok/fail checks (not skip) for installed CLI', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n\n    const result = await runDoctor()\n    const configSection = result.sections.find(s => s.title === 'Config Files')!\n\n    const claudeConfigCheck = configSection.checks.find(c =>\n      c.label.includes('.claude') || c.label.includes('CLAUDE')\n    )\n    expect(claudeConfigCheck).toBeDefined()\n    expect(['ok', 'fail']).toContain(claudeConfigCheck?.status)\n  })\n\n  it('config file absent: status fail for installed CLI config', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n\n    const result = await runDoctor()\n    const configSection = result.sections.find(s => s.title === 'Config Files')!\n\n    const claudeConfigCheck = configSection.checks.find(c =>\n      c.label.includes('.claude') || c.label.includes('CLAUDE')\n    )!\n    expect(['ok', 'fail']).toContain(claudeConfigCheck.status)\n    if (claudeConfigCheck.status === 'fail') {\n      expect(claudeConfigCheck.detail).toContain('missing')\n    }\n  })\n\n  it('hook file absent: status fail (when hooks source exists)', async () => {\n    mockReadManifest.mockResolvedValue(makeManifest(['claude']))\n\n    const hooksSrc = path.join(FIXED_ASSETS_ROOT, 'own', 'hooks', 'claude')\n    await fs.ensureDir(hooksSrc)\n    await fs.writeFile(path.join(hooksSrc, 'check-format.sh'), '#!/bin/sh', 'utf-8')\n\n    const result = await runDoctor()\n    const hookSection = result.sections.find(s => s.title === 'Hooks')!\n\n    const hookCheck = hookSection.checks.find(c => c.label.includes('check-format.sh'))\n    if (hookCheck) {\n      expect(hookCheck.status).toBe('fail')\n      expect(hookCheck.detail).toContain('not found')\n    }\n  })\n\n  it('hook file present + executable: hook check status reflects install state', async ()
