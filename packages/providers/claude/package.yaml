kind: ai-provider-profile
id: provider.claude.core
provider_id: claude
display_name: Claude Code
version: 0.1.0
status: scaffold
owner: javi-ai
canonical_path: packages/providers/claude
install_target: target.claude.user
contract_refs:
  provider_manifest: manifests/providers.yaml#claude
  package_manifest: manifests/packages.yaml#provider.claude.core
  target_manifest: manifests/targets.yaml#target.claude.user
composition:
  required_packages:
    - shared.instructions
  optional_shared_packages:
    - shared.agents
    - shared.skills
    - shared.hooks
    - shared.commands
    - shared.mcp
    - shared.memory
homes:
  runtime: packages/providers/claude/runtime
  overrides: packages/providers/claude/overrides
  targets: packages/providers/claude/targets
lineage:
  upstream_inputs:
    - upstream/gentle-ai
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
    - delta/project-starter-framework
  extraction_status: pending-curation
scope:
  owns:
    - provider-specific runtime config and wrappers for Claude Code
    - provider-specific overrides, themes, permissions, and UX settings
    - install-target assembly inputs for target.claude.user
  excludes:
    - shared instructions, agents, skills, hooks, commands, MCP, and memory packages
    - bootstrap wrappers owned by javi-dots
    - project-scaffolding assets owned by javi-forge
notes:
  - Scaffold only for WI-017; provider profile authority exists before provider asset extraction.
  - Shared behavior remains canonical in shared packages even when Claude adds local overrides.
