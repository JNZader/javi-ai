kind: ai-provider-profile
id: provider.opencode.core
provider_id: opencode
display_name: OpenCode
version: 0.1.0
status: partial
owner: javi-ai
canonical_path: packages/providers/opencode
install_target: target.opencode.user
contract_refs:
  provider_manifest: manifests/providers.yaml#opencode
  package_manifest: manifests/packages.yaml#provider.opencode.core
  target_manifest: manifests/targets.yaml#target.opencode.user
composition:
  required_packages:
    - shared.instructions
  optional_shared_packages:
    - shared.agents
    - shared.skills
    - shared.hooks
    - shared.commands
    - shared.mcp
    - shared.memory
homes:
  runtime: packages/providers/opencode/runtime
  overrides: packages/providers/opencode/overrides
  targets: packages/providers/opencode/targets
lineage:
  upstream_inputs:
    - upstream/gentle-ai
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
    - delta/project-starter-framework
  legacy_sources:
    - vault/Javi.Dots/GentlemanOpenCode/opencode.json
    - vault/Javi.Dots/GentlemanOpenCode/themes/gentleman.json
  extraction_status: slice-wi-019
  extracted_assets:
    - runtime/opencode.json
    - overrides/gentleman-theme.json
    - targets/user-profile.yaml
scope:
  owns:
    - provider-specific runtime config and wrappers for OpenCode
    - provider-specific overrides, themes, permissions, and UX settings
    - install-target assembly inputs for target.opencode.user
  excludes:
    - shared instructions, agents, skills, hooks, commands, MCP, and memory packages
    - bootstrap wrappers owned by javi-dots
    - project-scaffolding assets owned by javi-forge
notes:
  - WI-019 lands the first OpenCode-specific runtime and theme slice in the provider profile.
  - Shared behavior remains canonical in shared packages even when OpenCode adds local overrides.
