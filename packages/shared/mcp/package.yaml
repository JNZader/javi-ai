kind: ai-shared-package
id: shared.mcp
version: 0.1.0
status: partial
owner: javi-ai
canonical_path: packages/shared/mcp
purpose: Canonical shared MCP package for reusable machine-context integrations across providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
    - upstream/engram
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
  extraction_status: javi-ai-completion
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable MCP assets
    - provider-neutral MCP integration metadata
    - shared packaging metadata for MCP-derived slices
  excludes:
    - provider-specific MCP auth or transport overrides
    - machine bootstrap integrations outside AI ownership
    - forge project integration manifests
extracted_assets:
  - mcp-servers.template.json
  - opencode-mcp.template.json
notes:
  - javi-ai-completion extracted MCP server templates for Claude and OpenCode formats.
  - All API keys are placeholder values; consumers must substitute real keys before use.
  - Templates are reference configs, not installed directly by the consumer's tooling.
