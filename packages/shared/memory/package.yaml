kind: ai-shared-package
id: shared.memory
version: 0.1.0
status: scaffold
owner: javi-ai
canonical_path: packages/shared/memory
purpose: Canonical shared memory package for reusable memory, context, and recall assets across providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/engram
    - upstream/gentle-ai
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
  extraction_status: pending-curation
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable memory integration assets
    - context persistence metadata
    - shared memory package lineage tracking
  excludes:
    - provider-local memory overrides
    - non-AI workstation state owned by javi-dots
    - project-scoped memory integration contracts
notes:
  - Scaffold only for WI-016; memory asset extraction is deferred to later work items.
  - This package is the future canonical source for cross-provider memory behavior.
