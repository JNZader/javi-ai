kind: ai-shared-package
id: shared.instructions
version: 0.1.0
status: partial
owner: javi-ai
canonical_path: packages/shared/instructions
purpose: Canonical shared instructions package for reusable AI instructions and policy assets across providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
    - upstream/agent-teams-lite
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
    - delta/project-starter-framework
  legacy_sources:
    - vault/Javi.Dots/AGENTS.md
    - vault/Javi.Dots/unified-instructions/README.md
    - vault/Javi.Dots/unified-instructions/orchestrator.md
  extraction_status: slice-wi-018
  extracted_assets:
    - AGENTS.md
    - README.md
    - orchestrator.md
composition:
  depends_on: []
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable instructions shared by two or more providers
    - canonical policy and guidance assets for package composition
    - lineage metadata for instruction-related migrated deltas
  excludes:
    - provider-specific overrides that belong in provider profiles
    - bootstrap-only onboarding docs
    - project template instructions owned by javi-forge
notes:
  - WI-018 lands the first canonical legacy-derived instruction slice in this package.
  - Shared instruction ownership stays here even when providers add local overrides later.
  - Legacy remains reference-only for instruction assets that have not been curated into later slices yet.
