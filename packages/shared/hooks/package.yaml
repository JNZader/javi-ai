kind: ai-shared-package
id: shared.hooks
version: 0.1.0
status: scaffold
owner: javi-ai
canonical_path: packages/shared/hooks
purpose: Canonical shared hooks package for reusable automation that applies across AI providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
    - upstream/agent-teams-lite
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
  extraction_status: pending-curation
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable hook definitions
    - provider-neutral automation triggers
    - shared hook packaging metadata
  excludes:
    - provider-specific hook overrides
    - repo bootstrap hooks outside AI scope
    - template generation hooks owned by javi-forge
notes:
  - Scaffold only for WI-016; no hook assets are extracted yet.
  - Provider-specific overrides belong in provider profile directories, not here.
