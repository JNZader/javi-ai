kind: ai-shared-package
id: shared.hooks
version: 0.1.0
status: partial
owner: javi-ai
canonical_path: packages/shared/hooks
purpose: Canonical shared hooks package for reusable automation that applies across AI providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
    - upstream/agent-teams-lite
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
  legacy_sources:
    - vault/Javi.Dots/GentlemanClaude/hooks/comment-check.sh
    - vault/Javi.Dots/GentlemanClaude/hooks/todo-tracker.sh
  extraction_status: slice-wi-018
  extracted_assets:
    - scripts/comment-check.sh
    - scripts/todo-tracker.sh
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable hook definitions
    - provider-neutral automation triggers
    - shared hook packaging metadata
  excludes:
    - provider-specific hook overrides
    - repo bootstrap hooks outside AI scope
    - template generation hooks owned by javi-forge
notes:
  - WI-018 lands the first reusable hook subset in this package.
  - Provider-specific overrides belong in provider profile directories, not here.
  - Legacy remains reference-only for hook assets that have not been repackaged into provider targets yet.
