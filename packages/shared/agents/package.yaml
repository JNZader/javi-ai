kind: ai-shared-package
id: shared.agents
version: 0.1.0
status: partial
owner: javi-ai
canonical_path: packages/shared/agents
purpose: Canonical shared agent and orchestrator package for multi-provider AI flows.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
    - upstream/agent-teams-lite
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
    - delta/project-starter-framework
  legacy_sources:
    - vault/Javi.Dots/opencode-agents/
  extraction_status: slice-wi-018
  extracted_assets:
    - orchestrators/gentleman.md
    - orchestrators/master-orchestrator.md
    - orchestrators/sdd-orchestrator.md
    - orchestrators/architect-orchestrator.md
    - orchestrators/frontend-orchestrator.md
    - orchestrators/backend-orchestrator.md
    - orchestrators/devops-orchestrator.md
    - orchestrators/data-ai-orchestrator.md
    - orchestrators/quality-orchestrator.md
    - orchestrators/business-orchestrator.md
    - orchestrators/specialized-orchestrator.md
    - orchestrators/planner-orchestrator.md
    - orchestrators/README.md
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable agent definitions
    - orchestrator assets shared by two or more providers
    - provider-neutral execution flow metadata
  excludes:
    - provider-specific runtime config
    - bootstrap UX logic owned by javi-dots
    - project template logic owned by javi-forge
notes:
  - WI-018 lands the first canonical legacy-derived orchestrator slice in this package.
  - Shared-first rule applies before any provider duplicates this capability.
  - Provider packaging remains a later step; these files are the canonical shared source for this migrated slice.
