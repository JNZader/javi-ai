kind: ai-shared-package
id: shared.skills
version: 0.1.0
status: scaffold
owner: javi-ai
canonical_path: packages/shared/skills
purpose: Canonical shared skill package for reusable AI capabilities across first-class providers.
consumers:
  - provider.claude.core
  - provider.opencode.core
  - provider.gemini.core
  - provider.qwen.core
  - provider.codex.core
  - provider.copilot.core
lineage:
  upstream_inputs:
    - upstream/gentle-ai
  delta_inputs:
    - delta/javi-dots
    - delta/agentes-ia
    - delta/project-starter-framework
  extraction_status: pending-curation
composition:
  depends_on:
    - shared.instructions
  install_targets:
    - target.claude.user
    - target.opencode.user
    - target.gemini.user
    - target.qwen.user
    - target.codex.user
    - target.copilot.repo
scope:
  includes:
    - reusable skills consumed by two or more providers
    - shared capability packaging metadata
    - canonical home for skill-level extracted deltas
  excludes:
    - provider-only prompt tuning
    - bootstrap-only helper scripts
    - forge template behaviors
notes:
  - Scaffold only for WI-016; extraction starts in later work items.
  - This directory becomes the canonical shared source once assets are migrated.
